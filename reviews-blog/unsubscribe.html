<main>
  <p class="eyebrow">Email preferences</p>
  <h1>Unsubscribe</h1>
  <p id="intro">You can stop Envizion blog and game review emails here.</p>

  <form id="unsubscribe-form">
    <label for="email">Email address</label>
    <input id="email" name="email" type="email" autocomplete="email" placeholder="you@example.com">
    <button id="submit-btn" type="submit">Unsubscribe</button>
  </form>

  <div class="status" id="status" aria-live="polite"></div>
  <div class="actions">
    <a class="button" href="index.html">Return to Envizion</a>
  </div>
</main>

<script src="firebase-config.js"></script>
<script src="notifications.js"></script>
<script>
  const params = new URLSearchParams(window.location.search);
  const id = params.get('id') || '';
  const emailParam = params.get('email') || '';
  const form = document.getElementById('unsubscribe-form');
  const emailInput = document.getElementById('email');
  const statusEl = document.getElementById('status');
  const button = document.getElementById('submit-btn');

  if (emailParam) emailInput.value = emailParam;

  function setStatus(message, type) {
    statusEl.textContent = message;
    statusEl.className = `status ${type || ''}`;
  }

  async function unsubscribe(payload) {
    button.disabled = true;
    button.textContent = 'Unsubscribing...';
    setStatus('Updating your email preferences...', '');

    try {
      await window.EnvizionNotifications.unsubscribeSubscriber({
        ...payload,
        sourcePage: 'unsubscribe.html'
      });
      localStorage.removeItem('envizion_signup');
      setStatus('You are unsubscribed. You will no longer receive Envizion notification emails.', 'success');
      form.style.display = 'none';
    } catch (error) {
      console.error(error);
      setStatus(error.message || 'Unsubscribe failed. Please try again.', 'error');
    } finally {
      button.disabled = false;
      button.textContent = 'Unsubscribe';
    }
  }

  form.addEventListener('submit', (event) => {
    event.preventDefault();
    const email = emailInput.value.trim();
    if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
      setStatus('Please enter a valid email address.', 'error');
      return;
    }
    unsubscribe({ email });
  });

  if (id) {
    form.style.display = 'none';
    unsubscribe({ id });
  }
</script>

<script>
(function() {
    const upBtn = document.getElementById('envizion-scroll-up-btn');
    const folderBtn = document.getElementById('envizion-folder-nav-btn');
    
    function checkScrollPosition() {
        // Calculate document coordinates and viewport dimensions
        const windowHeight = window.innerHeight;
        const scrollY = window.scrollY || window.pageYOffset;
        const documentHeight = document.documentElement.scrollHeight;
        
        // Triggers visibility when user is within 40px of the absolute page bottom
        if ((windowHeight + scrollY) >= (documentHeight - 40)) {
            upBtn.classList.add('visible-at-bottom');
            folderBtn.classList.add('visible-at-bottom');
        } else {
            upBtn.classList.remove('visible-at-bottom');
            folderBtn.classList.remove('visible-at-bottom');
        }
    }

    window.addEventListener('scroll', checkScrollPosition);
    window.addEventListener('resize', checkScrollPosition);
    // Initial run to verify height state on short pages
    document.addEventListener('DOMContentLoaded', checkScrollPosition);
    checkScrollPosition();
})();
</script>
