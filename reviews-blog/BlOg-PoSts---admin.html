<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/png" href="logo.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blog Admin - Envizion</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#f5f7fb;--panel:#fff;--line:#e2e8f0;--text:#0f172a;--muted:#64748b;--blue:#2563eb;--purple:#8b5cf6;--green:#16a34a;--red:#dc2626;--amber:#d97706;--radius:12px;--shadow:0 18px 50px rgba(15,23,42,.09)}
*{box-sizing:border-box} body{margin:0;min-height:100vh;background:var(--bg);color:var(--text);font-family:Inter,system-ui,sans-serif;display:grid;grid-template-columns:320px 1fr}
button,input,textarea,select{font:inherit} button{cursor:pointer}.sidebar{background:var(--panel);border-right:1px solid var(--line);height:100vh;display:flex;flex-direction:column}.side-head{padding:18px;border-bottom:1px solid var(--line)}.brand{font-weight:900;font-size:1.25rem;letter-spacing:-.04em}.brand span{color:var(--purple)}.status{margin-top:12px;border:1px solid var(--line);border-radius:999px;padding:7px 10px;color:var(--muted);font-size:.78rem;font-weight:800}.status.ok{color:var(--green);background:#ecfdf5}.status.err{color:var(--red);background:#fef2f2}.controls{display:grid;gap:8px;margin-top:14px}.btn{border:1px solid var(--line);border-radius:10px;background:#fff;color:var(--text);padding:9px 12px;font-weight:900}.btn.primary{background:linear-gradient(135deg,var(--blue),var(--purple));color:#fff;border:0}.btn.danger{color:var(--red);background:#fef2f2}.btn.small{padding:6px 9px;font-size:.78rem}.search{width:100%;border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin-top:12px}.meta{margin-top:10px;color:var(--muted);font-size:.8rem;font-weight:800}.list{padding:10px;overflow:auto;flex:1}.item{border:1px solid transparent;border-radius:10px;padding:10px;display:grid;gap:5px;cursor:pointer}.item:hover,.item.active{background:#f8fafc;border-color:var(--line)}.tag{width:max-content;color:#fff;border-radius:999px;padding:3px 8px;font-size:.68rem;font-weight:900}.title{font-weight:900;font-size:.9rem;line-height:1.25}.date{color:var(--muted);font-size:.76rem;font-weight:700}.main{height:100vh;overflow:auto;padding:24px}.top{display:flex;justify-content:space-between;gap:12px;align-items:center;margin-bottom:18px}.top h1{margin:0;font-size:clamp(1.7rem,3vw,2.5rem);letter-spacing:-.06em}.top p{margin:5px 0 0;color:var(--muted);font-weight:650}.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px;margin-bottom:14px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.field{display:grid;gap:6px}.field label{font-size:.78rem;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);font-weight:900}.field input,.field textarea,.field select{border:1px solid var(--line);border-radius:10px;padding:10px 12px;background:#fff;color:var(--text);outline:none}.field textarea{min-height:96px;resize:vertical;line-height:1.55}.span2{grid-column:1/-1}.section-title{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:12px;font-size:.8rem;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);font-weight:900}.block{border:1px solid var(--line);border-radius:12px;margin-bottom:10px;overflow:hidden}.block-head{display:flex;align-items:center;justify-content:space-between;gap:10px;background:#f8fafc;padding:10px 12px;border-bottom:1px solid var(--line)}.block-body{padding:12px;display:grid;gap:10px}.block-type{font-size:.75rem;font-weight:900;color:var(--purple);text-transform:uppercase}.empty{height:70vh;display:grid;place-items:center;text-align:center;color:var(--muted)}.empty h2{color:var(--text);margin:.2rem 0}.toast{position:fixed;right:22px;bottom:22px;background:#111827;color:#fff;padding:12px 14px;border-radius:12px;box-shadow:var(--shadow);font-weight:800;opacity:0;transform:translateY(20px);transition:.2s}.toast.show{opacity:1;transform:none}.toast.success{background:var(--green)}.toast.error{background:var(--red)}@media(max-width:850px){body{grid-template-columns:1fr}.sidebar{height:auto;max-height:48vh}.main{height:auto}.grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<aside class="sidebar">
  <div class="side-head">
    <div class="brand"><span>Envizion</span> Blog Admin</div>
    <div id="status" class="status">Not connected</div>
    <div class="controls">
      <button class="btn" onclick="connectGitHub()">Connect GitHub</button>
      <button class="btn" onclick="pullPosts()">Pull from GitHub</button>
      <button class="btn primary" onclick="publishPosts()">Publish to GitHub</button>
      <button class="btn" onclick="newPost()">New Post</button>
    </div>
    <input id="search" class="search" type="search" placeholder="Search posts" oninput="renderList()">
    <div id="count" class="meta">0 posts</div>
  </div>
  <div id="list" class="list"><div class="empty">Pull posts from GitHub to start.</div></div>
</aside>
<main class="main">
  <div class="top">
    <div>
      <h1>Blog Posts</h1>
      <p>Edits publish to <strong> blog-data.js</strong>. This page only manages blog posts.</p>
    </div>
    <a class="btn" href=" blog.html" target="_blank">Open Blog</a>
  </div>
  <div id="editor" class="empty">
    <div>
      <h2>No post selected</h2>
      <p>Pull from GitHub, then choose a post or create a new one.</p>
    </div>
  </div>
</main>
<div id="toast" class="toast"></div>
<script>
const OWNER_KEY = "envizion_git_owner";
const REPO_KEY = "envizion_git_repo";
const TOKEN_KEY = "envizion_github_token";
const BLOG_PATH = " blog-data.js";
const DEFAULT_OWNER = "yacob247";
const DEFAULT_REPO = "yacob247.github.io";
const TAG_COLORS = ["#22c55e","#10b981","#2563eb","#8b5cf6","#ef4444","#f59e0b","#06b6d4","#ec4899"];
let posts = [];
let activeSlug = "";
let remoteSha = "";
let dirty = false;

function owner(){return localStorage.getItem(OWNER_KEY) || DEFAULT_OWNER}
function repo(){return localStorage.getItem(REPO_KEY) || DEFAULT_REPO}
function token(){return sessionStorage.getItem(TOKEN_KEY) || localStorage.getItem(TOKEN_KEY) || ""}
function headers(){return {Authorization:`token ${token()}`,"Content-Type":"application/json"}}
function setStatus(text, cls=""){const el=document.getElementById("status");el.textContent=text;el.className="status "+cls}
function toast(msg,type=""){const el=document.getElementById("toast");el.textContent=msg;el.className="toast show "+type;setTimeout(()=>el.className="toast",2600)}
function esc(value){return String(value ?? "").replace(/[&<>"']/g,ch=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[ch]))}
function slugify(value){return String(value||"").toLowerCase().trim().replace(/[^a-z0-9\s-]/g,"").replace(/\s+/g,"-").replace(/-+/g,"-").replace(/^-|-$/g,"")}
function markDirty(){dirty=true;setStatus("Unsaved local changes","err")}

function connectGitHub(){
  const nextOwner = prompt("GitHub owner", owner()) || owner();
  const nextRepo = prompt("GitHub repo", repo()) || repo();
  const nextToken = prompt("GitHub personal access token", token()) || token();
  localStorage.setItem(OWNER_KEY,nextOwner);
  localStorage.setItem(REPO_KEY,nextRepo);
  if(nextToken) sessionStorage.setItem(TOKEN_KEY,nextToken);
  setStatus(nextToken ? `Connected: ${nextOwner}/${nextRepo}` : "Token missing", nextToken ? "ok" : "err");
}

async function pullPosts(){
  if(!token()) connectGitHub();
  if(!token()) return toast("GitHub token required","error");
  setStatus("Pulling from GitHub...");
  try{
    const res = await fetch(`https://api.github.com/repos/${owner()}/${repo()}/contents/${BLOG_PATH}?cb=${Date.now()}`,{headers:headers()});
    const data = await res.json();
    if(!res.ok) throw new Error(data.message || res.statusText);
    remoteSha = data.sha;
    const text = decodeURIComponent(escape(atob(data.content)));
    const loaded = new Function(`${text}; return typeof POSTS !== "undefined" ? POSTS : [];`)();
    posts = JSON.parse(JSON.stringify(loaded));
    activeSlug = posts[0]?.slug || "";
    dirty = false;
    setStatus(`Live: ${BLOG_PATH}`,"ok");
    renderList();
    renderEditor();
    toast(`Pulled ${posts.length} posts`,"success");
  }catch(error){setStatus("Pull failed","err");toast(error.message,"error")}
}

async function publishPosts(){
  if(!token()) connectGitHub();
  if(!token()) return toast("GitHub token required","error");
  saveActivePost(false);
  setStatus("Publishing...");
  try{
    if(!remoteSha){
      const latest = await fetch(`https://api.github.com/repos/${owner()}/${repo()}/contents/${BLOG_PATH}?cb=${Date.now()}`,{headers:headers()});
      if(latest.ok) remoteSha = (await latest.json()).sha;
    }
    const payload = {message:"Blog Admin: update posts",content:btoa(unescape(encodeURIComponent(serializePosts())))};
    if(remoteSha) payload.sha = remoteSha;
    const res = await fetch(`https://api.github.com/repos/${owner()}/${repo()}/contents/${BLOG_PATH}`,{method:"PUT",headers:headers(),body:JSON.stringify(payload)});
    const data = await res.json();
    if(!res.ok) throw new Error(data.message || res.statusText);
    remoteSha = data.content?.sha || remoteSha;
    dirty = false;
    setStatus(`Published: ${BLOG_PATH}`,"ok");
    toast("Published to GitHub","success");
  }catch(error){setStatus("Publish failed","err");toast(error.message,"error")}
}

function serializePosts(){
  return `// Blog post content for Envizion.\n// Managed by BlOg-PoSts---admin.html.\n\nconst POSTS = ${JSON.stringify(posts,null,2)};\n`;
}

function renderList(){
  const q = document.getElementById("search").value.toLowerCase();
  const filtered = posts.filter(p=>[p.title,p.slug,p.tag].some(v=>String(v||"").toLowerCase().includes(q)));
  document.getElementById("count").textContent = `${filtered.length} of ${posts.length} posts`;
  document.getElementById("list").innerHTML = filtered.length ? filtered.map(p=>`
    <div class="item ${p.slug===activeSlug?"active":""}" onclick="selectPost('${esc(p.slug)}')">
      <span class="tag" style="background:${esc(p.tagColor||"#8b5cf6")}">${esc(p.tag||"Post")}</span>
      <div class="title">${esc(p.title||p.slug)}</div>
      <div class="date">${esc(p.date||"")}</div>
    </div>`).join("") : `<div class="empty">No posts found.</div>`;
}

function selectPost(slug){saveActivePost(false);activeSlug=slug;renderList();renderEditor()}
function post(){return posts.find(p=>p.slug===activeSlug)}
function newPost(){
  saveActivePost(false);
  const slug = `new-post-${Date.now()}`;
  posts.unshift({slug,title:"New Post",date:new Date().toLocaleDateString("en-US",{month:"long",day:"numeric",year:"numeric"}),tag:"Post",tagColor:"#8b5cf6",excerpt:"",body:[{type:"intro",text:""}]});
  activeSlug = slug;
  markDirty();
  renderList();
  renderEditor();
}
function deletePost(){
  const p = post();
  if(!p || !confirm(`Delete "${p.title || p.slug}"?`)) return;
  posts = posts.filter(item=>item.slug!==p.slug);
  activeSlug = posts[0]?.slug || "";
  markDirty();
  renderList();
  renderEditor();
}

function renderEditor(){
  const p = post();
  if(!p){document.getElementById("editor").className="empty";document.getElementById("editor").innerHTML="<div><h2>No post selected</h2><p>Create a post or pull from GitHub.</p></div>";return}
  document.getElementById("editor").className="";
  document.getElementById("editor").innerHTML = `
    <div class="card">
      <div class="section-title"><span>Post Details</span><div><a class="btn small" target="_blank" href=" blog-post.html?id=${encodeURIComponent(p.slug)}">Preview</a> <button class="btn danger small" onclick="deletePost()">Delete</button></div></div>
      <div class="grid">
        <div class="field span2"><label>Title</label><input id="title" value="${esc(p.title)}" oninput="syncMeta(true)"></div>
        <div class="field"><label>Slug</label><input id="slug" value="${esc(p.slug)}" oninput="syncMeta()"></div>
        <div class="field"><label>Date</label><input id="date" value="${esc(p.date)}" oninput="syncMeta()"></div>
        <div class="field"><label>Tag</label><input id="tag" value="${esc(p.tag)}" oninput="syncMeta()"></div>
        <div class="field"><label>Tag Color</label><select id="tagColor" onchange="syncMeta()">${TAG_COLORS.map(c=>`<option value="${c}" ${p.tagColor===c?"selected":""}>${c}</option>`).join("")}</select></div>
        <div class="field span2"><label>Excerpt</label><textarea id="excerpt" oninput="syncMeta()">${esc(p.excerpt)}</textarea></div>
      </div>
    </div>
    <div class="card">
      <div class="section-title"><span>Body Blocks</span><div><button class="btn small" onclick="addBlock('intro')">Intro</button> <button class="btn small" onclick="addBlock('entry')">Entry</button> <button class="btn small" onclick="addBlock('outro')">Outro</button> <button class="btn small" onclick="addBlock('ad')">Ad</button></div></div>
      <div id="blocks">${(p.body||[]).map(blockHtml).join("")}</div>
    </div>`;
}

function syncMeta(fromTitle=false){
  const p = post(); if(!p) return;
  p.title = document.getElementById("title").value;
  if(fromTitle && /^new-post-/.test(p.slug)){
    p.slug = slugify(p.title) || p.slug;
    document.getElementById("slug").value = p.slug;
    activeSlug = p.slug;
  } else {
    p.slug = slugify(document.getElementById("slug").value) || p.slug;
    activeSlug = p.slug;
  }
  p.date = document.getElementById("date").value;
  p.tag = document.getElementById("tag").value;
  p.tagColor = document.getElementById("tagColor").value;
  p.excerpt = document.getElementById("excerpt").value;
  markDirty();
  renderList();
}

function blockHtml(block,i){
  const type = block.type || "intro";
  if(type==="entry") return `<div class="block"><div class="block-head"><span class="block-type">Entry</span>${blockActions(i)}</div><div class="block-body"><div class="grid"><div class="field"><label>Rank</label><input data-i="${i}" data-k="rank" type="number" value="${esc(block.rank||"")}" oninput="syncBlock(this)"></div><div class="field"><label>Game ID</label><input data-i="${i}" data-k="gameId" value="${esc(block.gameId||"")}" oninput="syncBlock(this)"></div><div class="field span2"><label>Title</label><input data-i="${i}" data-k="title" value="${esc(block.title||"")}" oninput="syncBlock(this)"></div><div class="field span2"><label>Text</label><textarea data-i="${i}" data-k="text" oninput="syncBlock(this)">${esc(block.text||"")}</textarea></div></div></div></div>`;
  if(type==="ad") return `<div class="block"><div class="block-head"><span class="block-type">Ad</span>${blockActions(i)}</div><div class="block-body"><div class="field"><label>Ad Slot</label><input data-i="${i}" data-k="adSlot" value="${esc(block.adSlot||"")}" oninput="syncBlock(this)"></div></div></div>`;
  return `<div class="block"><div class="block-head"><span class="block-type">${esc(type)}</span>${blockActions(i)}</div><div class="block-body"><div class="field"><label>Text</label><textarea data-i="${i}" data-k="text" oninput="syncBlock(this)">${esc(block.text||"")}</textarea></div></div></div>`;
}
function blockActions(i){return `<div><button class="btn small" onclick="moveBlock(${i},-1)">Up</button> <button class="btn small" onclick="moveBlock(${i},1)">Down</button> <button class="btn danger small" onclick="removeBlock(${i})">Remove</button></div>`}
function syncBlock(input){const p=post();const b=p.body[Number(input.dataset.i)];b[input.dataset.k]=input.dataset.k==="rank"?Number(input.value):input.value;markDirty()}
function addBlock(type){const p=post();if(!p)return;p.body ||= [];p.body.push(type==="entry"?{type,rank:p.body.length+1,title:"",text:""}:type==="ad"?{type,adSlot:""}:{type,text:""});markDirty();renderEditor()}
function removeBlock(i){const p=post();p.body.splice(i,1);markDirty();renderEditor()}
function moveBlock(i,dir){const p=post();const n=i+dir;if(n<0||n>=p.body.length)return;[p.body[i],p.body[n]]=[p.body[n],p.body[i]];markDirty();renderEditor()}
function saveActivePost(show=true){syncMeta(); if(show) toast("Post saved locally")}
window.addEventListener("beforeunload",event=>{if(dirty){event.preventDefault();event.returnValue=""}});
if(token()) setStatus(`Connected: ${owner()}/${repo()}`,"ok");
</script>
</body>
</html>
