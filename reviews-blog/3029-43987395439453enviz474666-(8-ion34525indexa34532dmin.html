<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="robots" content="noindex, nofollow">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel — Games & Tools</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14;
    --surface: #13161e;
    --surface2: #1a1e28;
    --border: #252933;
    --accent: #f59e0b;
    --accent2: #10b981;
    --danger: #ef4444;
    --text: #e2e8f0;
    --muted: #64748b;
    --mono: 'Space Mono', monospace;
    --sans: 'DM Sans', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    display: flex;
  }

  /* SIDEBAR */
  .sidebar {
    width: 260px;
    min-width: 260px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    height: 100vh;
    position: sticky;
    top: 0;
    overflow: hidden;
  }

  .sidebar-header {
    padding: 1.5rem;
    border-bottom: 1px solid var(--border);
  }

  .logo {
    font-family: var(--mono);
    font-size: 0.7rem;
    color: var(--accent);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 0.25rem;
  }

  .logo-title {
    font-size: 1.1rem;
    font-weight: 600;
    color: var(--text);
  }

  .sidebar-stats {
    display: flex;
    gap: 1rem;
    padding: 1rem 1.5rem;
    border-bottom: 1px solid var(--border);
  }

  .stat {
    text-align: center;
  }

  .stat-num {
    font-family: var(--mono);
    font-size: 1.2rem;
    color: var(--accent);
    display: block;
  }

  .stat-label {
    font-size: 0.65rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  .sidebar-nav {
    padding: 1rem 0;
    flex: 1;
    overflow-y: auto;
  }

  .nav-section-label {
    font-family: var(--mono);
    font-size: 0.6rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    padding: 0.5rem 1.5rem 0.25rem;
  }

  .entry-list {
    list-style: none;
  }

  .entry-item {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    padding: 0.5rem 1.5rem;
    cursor: pointer;
    border-left: 2px solid transparent;
    transition: all 0.15s;
  }

  .entry-item:hover { background: var(--surface2); }
  .entry-item.active { background: var(--surface2); border-left-color: var(--accent); }

  .entry-item .entry-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .entry-item .entry-name {
    font-size: 0.82rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
  }

  .entry-item .entry-type-badge {
    font-family: var(--mono);
    font-size: 0.55rem;
    padding: 1px 5px;
    border-radius: 3px;
    flex-shrink: 0;
  }

  .badge-game { background: rgba(245,158,11,0.15); color: var(--accent); }
  .badge-tool { background: rgba(16,185,129,0.15); color: var(--accent2); }

  .sidebar-footer {
    padding: 1rem 1.5rem;
    border-top: 1px solid var(--border);
  }

  .btn-new {
    width: 100%;
    background: var(--accent);
    color: #000;
    border: none;
    padding: 0.65rem;
    font-family: var(--mono);
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 4px;
    font-weight: 700;
    transition: opacity 0.15s;
  }

  .btn-new:hover { opacity: 0.85; }

  /* MAIN */
  .main {
    flex: 1;
    overflow-y: auto;
    min-width: 0;
  }

  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1.25rem 2rem;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .topbar-title {
    font-family: var(--mono);
    font-size: 0.75rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.12em;
  }

  .topbar-actions { display: flex; gap: 0.75rem; align-items: center; }

  .btn {
    border: none;
    padding: 0.55rem 1.1rem;
    font-family: var(--mono);
    font-size: 0.65rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 4px;
    font-weight: 700;
    transition: all 0.15s;
  }

  .btn-primary { background: var(--accent); color: #000; }
  .btn-primary:hover { opacity: 0.85; }
  .btn-success { background: var(--accent2); color: #000; }
  .btn-success:hover { opacity: 0.85; }
  .btn-danger { background: var(--danger); color: #fff; }
  .btn-danger:hover { opacity: 0.85; }
  .btn-ghost { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }

  /* FORM CONTENT */
  .form-content {
    padding: 2rem;
    max-width: 860px;
  }

  .type-toggle {
    display: flex;
    gap: 0;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
    margin-bottom: 2rem;
    width: fit-content;
  }

  .type-btn {
    padding: 0.6rem 1.5rem;
    font-family: var(--mono);
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    background: transparent;
    color: var(--muted);
    border: none;
    cursor: pointer;
    transition: all 0.15s;
  }

  .type-btn.active-game { background: var(--accent); color: #000; }
  .type-btn.active-tool { background: var(--accent2); color: #000; }
  .type-btn:not(.active-game):not(.active-tool):hover { color: var(--text); }

  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.25rem;
    margin-bottom: 1.25rem;
  }

  .form-grid.full { grid-template-columns: 1fr; }
  .form-grid.triple { grid-template-columns: 1fr 1fr 1fr; }

  .field {
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
  }

  .field.span2 { grid-column: span 2; }

  label {
    font-family: var(--mono);
    font-size: 0.62rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  label .required { color: var(--accent); margin-left: 2px; }

  input, textarea, select {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 0.6rem 0.8rem;
    font-family: var(--sans);
    font-size: 0.88rem;
    border-radius: 4px;
    outline: none;
    transition: border-color 0.15s;
    width: 100%;
  }

  input:focus, textarea:focus, select:focus {
    border-color: var(--accent);
  }

  select option { background: var(--surface2); }

  textarea { resize: vertical; min-height: 90px; }

  .field-hint {
    font-size: 0.7rem;
    color: var(--muted);
  }

  /* Dynamic list fields */
  .dynamic-list {
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
  }

  .dynamic-row {
    display: flex;
    gap: 0.4rem;
    align-items: flex-start;
  }

  .dynamic-row input, .dynamic-row textarea {
    flex: 1;
  }

  .btn-remove {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    width: 32px;
    height: 34px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 1rem;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }

  .btn-remove:hover { border-color: var(--danger); color: var(--danger); }

  .btn-add-row {
    background: transparent;
    border: 1px dashed var(--border);
    color: var(--muted);
    padding: 0.4rem 0.8rem;
    font-family: var(--mono);
    font-size: 0.62rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.15s;
    align-self: flex-start;
    margin-top: 0.2rem;
  }

  .btn-add-row:hover { border-color: var(--accent); color: var(--accent); }

  /* Divider */
  .section-divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 1.75rem 0;
  }

  .section-label {
    font-family: var(--mono);
    font-size: 0.62rem;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.15em;
    margin-bottom: 1rem;
  }

  /* EMPTY STATE */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 70vh;
    gap: 1rem;
    color: var(--muted);
  }

  .empty-icon {
    font-size: 3rem;
    opacity: 0.3;
  }

  .empty-title {
    font-family: var(--mono);
    font-size: 0.8rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .empty-sub { font-size: 0.85rem; text-align: center; max-width: 300px; }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 2rem;
    right: 2rem;
    background: var(--accent2);
    color: #000;
    padding: 0.75rem 1.25rem;
    font-family: var(--mono);
    font-size: 0.72rem;
    letter-spacing: 0.08em;
    border-radius: 4px;
    opacity: 0;
    transform: translateY(1rem);
    transition: all 0.25s;
    z-index: 999;
    pointer-events: none;
  }

  .toast.show { opacity: 1; transform: translateY(0); }
  .toast.error { background: var(--danger); color: #fff; }

  /* DELETE CONFIRM */
  .delete-confirm {
    display: none;
    align-items: center;
    gap: 0.75rem;
    background: rgba(239,68,68,0.1);
    border: 1px solid rgba(239,68,68,0.3);
    padding: 0.75rem 1rem;
    border-radius: 4px;
    margin-bottom: 1.5rem;
    font-size: 0.82rem;
  }

  .delete-confirm.show { display: flex; }

  /* Grade selector */
  .grade-select {
    display: flex;
    gap: 0.4rem;
    flex-wrap: wrap;
  }

  .grade-btn {
    padding: 0.35rem 0.7rem;
    font-family: var(--mono);
    font-size: 0.68rem;
    border-radius: 3px;
    cursor: pointer;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    transition: all 0.15s;
  }

  .grade-btn:hover, .grade-btn.selected { color: #000 !important; }

  /* Links section */
  .links-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  @media (max-width: 768px) {
    .sidebar { display: none; }
    .form-grid { grid-template-columns: 1fr; }
    .form-grid.triple { grid-template-columns: 1fr 1fr; }
    .field.span2 { grid-column: span 1; }
    .form-content { padding: 1rem; }
  }


   /* Admin Tabs */
  .admin-tabs {
    display: flex;
    border-top: 1px solid var(--border);
    margin-top: 1rem;
  }
  .admin-tab {
    flex: 1;
    padding: 0.75rem;
    background: transparent;
    border: none;
    color: var(--muted);
    font-family: var(--mono);
    font-size: 0.65rem;
    text-transform: uppercase;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
  }
  .admin-tab:hover { background: var(--surface2); }
  .admin-tab.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
    background: var(--surface2);
  }
  
  /* Blog Block Editor */
  .blog-block-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 1.25rem;
    margin-bottom: 1rem;
  }
  .blog-block-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1rem;
    font-family: var(--mono);
    font-size: 0.65rem;
    color: var(--accent2);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }
  .blog-block-actions { display: flex; gap: 0.5rem; }
</style>
</head>
<body>

<!-- SIDEBAR -->
<aside class="sidebar">
   <div class="sidebar-header" style="padding-bottom: 0;">
    <div class="logo">Admin Panel</div>
    <div class="logo-title" style="margin-bottom: 0.5rem;">Content Manager</div>
    <div class="admin-tabs">
      <button class="admin-tab active" id="tab-games" type="button">Games/Tools</button>
    </div>
  </div>
  <div class="sidebar-stats">
    <div class="stat" id="stat-games-container">
      <span class="stat-num" id="stat-games">0</span>
      <span class="stat-label">Games</span>
    </div>
    <div class="stat" id="stat-tools-container">
      <span class="stat-num" id="stat-tools">0</span>
      <span class="stat-label">Tools</span>
    </div>
    <div class="stat">
      <span class="stat-num" id="stat-total">0</span>
      <span class="stat-label">Total</span>
    </div>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-section-label">Entries</div>
    <ul class="entry-list" id="entry-list"></ul>
  </nav>
    <div class="sidebar-footer">
    <button class="btn-new" onclick="newEntry()">+ New Entry</button>
  </div>

</aside>

<!-- MAIN -->
<main class="main">
  <div class="topbar">
    <span class="topbar-title" id="topbar-title">Admin Panel</span>
    <div class="topbar-actions" id="topbar-actions"></div>
  </div>

  <div id="view-area">
    <!-- Content renders here -->
  </div>
</main>

<div class="toast" id="toast"></div>

<script src="firebase-config.js"></script>
<script src="notifications.js"></script>
<script src="admin1.js"></script>

</body>
</html>
