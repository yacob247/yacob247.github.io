<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudConvert Pro - Advanced Extractor</title>
    <!-- Production CSS -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
    <style>
        .nav-active {
            border-bottom: 3px solid #3b82f6; /* blue-500 */
            color: #3b82f6;
        }
        .loader {
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top: 3px solid #ffffff;
            border-radius: 50%;
            width: 22px;
            height: 22px;
            animation: spin 1s linear infinite;
        }
        .loader-small {
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top: 2px solid #ffffff;
            border-radius: 50%;
            width: 16px;
            height: 16px;
            animation: spin 1s linear infinite;
            display: inline-block;
            vertical-align: middle;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .animation-fade-in {
            animation: fadeIn 0.4s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-gray-50 font-sans text-gray-800 min-h-screen flex flex-col">

    <!-- Header -->
    <header class="bg-white shadow-sm border-b border-gray-200">
        <div class="container mx-auto px-4 py-4 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <svg class="w-8 h-8 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path>
                </svg>
                <span class="text-xl font-bold tracking-tight text-gray-800">CloudConvert Pro</span>
            </div>
        </div>
    </header>

    <!-- Main Workspace -->
    <main class="flex-grow container mx-auto px-4 py-10 max-w-5xl">
        
        <!-- Search Section -->
        <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 md:p-10 mb-8 text-center">
            <h1 class="text-3xl font-bold text-gray-800 mb-2">Cloud-Powered Downloader</h1>
            <p class="text-gray-500 mb-8">Utilizing enterprise AJAX conversion APIs. Fast, free, and completely error-free.</p>
            
            <div class="relative max-w-2xl mx-auto flex flex-col md:flex-row gap-3">
                <input type="text" id="url-input" 
                       class="w-full border-2 border-blue-200 focus:border-blue-500 rounded-lg px-4 py-4 outline-none transition-all text-gray-700 font-medium" 
                       placeholder="Paste YouTube link here...">
                <button id="search-btn" class="bg-blue-500 hover:bg-blue-600 text-white font-bold py-4 px-8 rounded-lg transition-colors flex items-center justify-center gap-2 min-w-[160px]">
                    <span id="btn-text">Analyze</span>
                    <div id="btn-spinner" class="loader hidden"></div>
                </button>
            </div>
            
            <!-- Hidden Error Label -->
            <p id="error-text" class="text-sm font-semibold mt-4 text-red-500 hidden"></p>
        </div>

        <!-- Result Section -->
        <div id="result-section" class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 hidden animation-fade-in">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                
                <!-- Left: Thumbnail & Meta -->
                <div class="md:col-span-1 flex flex-col items-center">
                    <img id="video-thumb" src="" alt="Thumbnail" class="w-full rounded-lg shadow-sm mb-4 border border-gray-200 bg-gray-100">
                    <h3 id="video-title" class="font-bold text-gray-800 text-center text-md leading-snug mb-2"></h3>
                </div>

                <!-- Right: Tables & Tabs -->
                <div class="md:col-span-2">
                    
                    <!-- Tabs -->
                    <div class="flex border-b border-gray-200 mb-4">
                        <button id="tab-video" class="py-3 px-6 font-semibold nav-active transition-colors w-1/2">Video (.mp4)</button>
                        <button id="tab-audio" class="py-3 px-6 font-semibold text-gray-500 hover:text-blue-500 transition-colors w-1/2">Audio (.mp3 / .flac)</button>
                    </div>

                    <!-- Video Table -->
                    <div id="table-video" class="overflow-x-auto">
                        <table class="w-full text-left border-collapse">
                            <thead>
                                <tr class="bg-gray-50 border-b border-gray-200">
                                    <th class="py-3 px-4 font-semibold text-gray-600">Resolution</th>
                                    <th class="py-3 px-4 font-semibold text-gray-600 text-right">Action</th>
                                </tr>
                            </thead>
                            <tbody id="video-tbody"></tbody>
                        </table>
                    </div>

                    <!-- Audio Table -->
                    <div id="table-audio" class="overflow-x-auto hidden">
                        <table class="w-full text-left border-collapse">
                            <thead>
                                <tr class="bg-gray-50 border-b border-gray-200">
                                    <th class="py-3 px-4 font-semibold text-gray-600">Format</th>
                                    <th class="py-3 px-4 font-semibold text-gray-600 text-right">Action</th>
                                </tr>
                            </thead>
                            <tbody id="audio-tbody"></tbody>
                        </table>
                    </div>

                </div>
            </div>
        </div>
    </main>

    <script>
        // Enterprise Cloud Conversion APIs (CORS Enabled natively)
        const BACKEND_APIS = [
            "https://loader.to/ajax",
            "https://p.oceansaver.in/ajax"
        ];

        let currentActiveUrl = "";

        // UI Tabs Logic
        const tabVideo = document.getElementById('tab-video');
        const tabAudio = document.getElementById('tab-audio');
        const tableVideo = document.getElementById('table-video');
        const tableAudio = document.getElementById('table-audio');

        tabVideo.onclick = () => {
            tabVideo.classList.add('nav-active', 'text-blue-500'); tabVideo.classList.remove('text-gray-500');
            tabAudio.classList.remove('nav-active', 'text-blue-500'); tabAudio.classList.add('text-gray-500');
            tableVideo.classList.remove('hidden'); tableAudio.classList.add('hidden');
        };

        tabAudio.onclick = () => {
            tabAudio.classList.add('nav-active', 'text-blue-500'); tabAudio.classList.remove('text-gray-500');
            tabVideo.classList.remove('nav-active', 'text-blue-500'); tabVideo.classList.add('text-gray-500');
            tableAudio.classList.remove('hidden'); tableAudio.classList.add('hidden');
        };

        // Standardize YouTube URLs to prevent backend routing issues
        function getCanonicalYouTubeUrl(inputUrl) {
            const match = inputUrl.match(/(?:youtu\.be\/|youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=)|youtu\.be\/)([^"&?\/\s]{11})/i);
            return match ? `https://www.youtube.com/watch?v=${match[1]}` : null;
        }

        // Search Action
        document.getElementById('search-btn').addEventListener('click', async () => {
            const rawUrl = document.getElementById('url-input').value.trim();
            const canonicalUrl = getCanonicalYouTubeUrl(rawUrl);
            
            if (!canonicalUrl) return alert("Please enter a valid YouTube video link.");
            currentActiveUrl = canonicalUrl;

            // Update UI State
            document.getElementById('search-btn').disabled = true;
            document.getElementById('btn-text').textContent = "Locating Media...";
            document.getElementById('btn-spinner').classList.remove('hidden');
            document.getElementById('result-section').classList.add('hidden');
            document.getElementById('error-text').classList.add('hidden');

            try {
                // Fetch basic metadata securely
                const metadataCall = await fetch(`https://noembed.com/embed?url=${encodeURIComponent(canonicalUrl)}`);
                const metaData = await metadataCall.json();
                
                document.getElementById('video-title').textContent = metaData.title || "YouTube Media Ready";
                document.getElementById('video-thumb').src = metaData.thumbnail_url || `https://img.youtube.com/vi/${canonicalUrl.split('v=')[1]}/mqdefault.jpg`;

                renderFormats();
            } catch (error) {
                // Failsafe rendering if thumbnail metadata fails
                document.getElementById('video-title').textContent = "Media Ready for Download";
                document.getElementById('video-thumb').src = `https://img.youtube.com/vi/${canonicalUrl.split('v=')[1]}/mqdefault.jpg`;
                renderFormats();
            } finally {
                document.getElementById('search-btn').disabled = false;
                document.getElementById('btn-text').textContent = "Analyze";
                document.getElementById('btn-spinner').classList.add('hidden');
            }
        });

        // Populate the Tables
        function renderFormats() {
            const videoFormats = [
                { q: '1080p (HD)', format: '1080' },
                { q: '720p', format: '720' },
                { q: '480p', format: '480' },
                { q: '360p', format: '360' }
            ];

            const audioFormats = [
                { q: 'MP3 (Highest Quality)', format: 'mp3' },
                { q: 'M4A (Standard)', format: 'm4a' },
                { q: 'FLAC (Lossless)', format: 'flac' },
                { q: 'WAV (Uncompressed)', format: 'wav' }
            ];

            const tbodyVideo = document.getElementById('video-tbody');
            const tbodyAudio = document.getElementById('audio-tbody');
            
            // Notice "blue" is now correctly passed to generate visible buttons
            tbodyVideo.innerHTML = videoFormats.map(f => generateRow(f.q, f.format, 'blue')).join('');
            tbodyAudio.innerHTML = audioFormats.map(f => generateRow(f.q, f.format, 'blue')).join('');

            document.getElementById('result-section').classList.remove('hidden');
        }

        function generateRow(qualityName, formatCode, colorTheme) {
            return `
                <tr class="border-b border-gray-100 hover:bg-gray-50 transition-colors">
                    <td class="py-4 px-4 font-bold text-gray-800">${qualityName}</td>
                    <td class="py-3 px-4 text-right">
                        <button onclick="initiateConversion('${formatCode}', this)" class="bg-${colorTheme}-500 text-white px-5 py-2 rounded-lg font-bold flex items-center justify-center min-w-[150px] hover:bg-${colorTheme}-600 transition shadow-sm float-right">
                            <span>Download</span>
                        </button>
                    </td>
                </tr>
            `;
        }

        // ==========================================
        // Advanced AJAX Engine (Silent API Execution)
        // ==========================================

        async function initiateConversion(format, btnElement) {
            const originalHTML = btnElement.innerHTML;
            btnElement.disabled = true;
            btnElement.innerHTML = `<span class="loader-small mr-2"></span> <span class="text-sm">Connecting...</span>`;
            
            let jobId = null;
            let activeBackend = null;

            // Step 1: Secretly ping the backend APIs to request a conversion Job ID
            for (let backend of BACKEND_APIS) {
                try {
                    const reqUrl = `${backend}/download.php?format=${format}&url=${encodeURIComponent(currentActiveUrl)}`;
                    const res = await fetch(reqUrl);
                    if (!res.ok) continue;

                    const data = await res.json();
                    if (data && data.id) {
                        jobId = data.id;
                        activeBackend = backend;
                        break; // Success! Exit failover loop.
                    }
                } catch (e) {
                    console.log("Silent rollover applied to backup server."); // Fails silently to next backend
                }
            }

            if (!jobId) {
                btnElement.innerHTML = `<span>Server Busy</span>`;
                btnElement.classList.replace('bg-blue-500', 'bg-red-500');
                btnElement.classList.replace('hover:bg-blue-600', 'hover:bg-red-600');
                alert("The cloud conversion servers are currently fully loaded. Please try clicking download again in a few seconds.");
                setTimeout(() => resetBtn(btnElement, originalHTML), 3000);
                return;
            }

            // Step 2: Begin monitoring the cloud conversion progress
            pollProgress(jobId, activeBackend, btnElement, originalHTML);
        }

        function pollProgress(jobId, backend, btnElement, originalHTML) {
            setTimeout(async () => {
                try {
                    const res = await fetch(`${backend}/progress.php?id=${jobId}`);
                    const data = await res.json();

                    // Check if file is ready
                    if (data.success && data.download_url) {
                        // Success State
                        btnElement.classList.replace('bg-blue-500', 'bg-green-500');
                        btnElement.classList.replace('hover:bg-blue-600', 'hover:bg-green-600');
                        btnElement.innerHTML = `<svg class="w-5 h-5 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg> Save File`;
                        btnElement.disabled = false;
                        
                        // Overwrite click action to just download the file now
                        btnElement.onclick = () => { window.location.href = data.download_url; };
                        
                        // Auto-trigger the download instantly
                        window.location.href = data.download_url;
                        return;
                    } 
                    
                    // Update progress UI (Progress variable from API goes up to 1000)
                    let percent = Math.floor(data.progress / 10);
                    let statusText = data.text || "Converting";
                    
                    btnElement.innerHTML = `<span class="loader-small mr-2"></span> <span class="text-sm tracking-wide">${percent}% - ${statusText}</span>`;
                    
                    // Continue polling
                    pollProgress(jobId, backend, btnElement, originalHTML);

                } catch (e) {
                    // Ignore temporary network packet drops and retry tracking
                    pollProgress(jobId, backend, btnElement, originalHTML);
                }
            }, 2500); // Poll every 2.5 seconds
        }

        function resetBtn(btn, html) {
            btn.innerHTML = html;
            btn.disabled = false;
            btn.classList.replace('bg-red-500', 'bg-blue-500');
            btn.classList.replace('hover:bg-red-600', 'hover:bg-blue-600');
        }
    </script>
</body>
</html>
