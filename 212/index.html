<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamNode - Free API Extractor</title>
    <!-- Production CSS -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
    <style>
        .nav-active {
            border-bottom: 3px solid #3b82f6; /* blue-500 */
            color: #3b82f6;
        }
        .loader {
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top: 3px solid #ffffff;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .animation-fade-in {
            animation: fadeIn 0.4s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-gray-50 font-sans text-gray-800 min-h-screen flex flex-col">

    <!-- Header -->
    <header class="bg-white shadow-sm border-b border-gray-200">
        <div class="container mx-auto px-4 py-4 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <svg class="w-8 h-8 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"></path>
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                </svg>
                <span class="text-xl font-bold tracking-tight text-gray-800">StreamNode Extractor</span>
            </div>
        </div>
    </header>

    <!-- Main Workspace -->
    <main class="flex-grow container mx-auto px-4 py-10 max-w-5xl">
        
        <!-- Search Section -->
        <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 md:p-10 mb-8 text-center">
            <h1 class="text-3xl font-bold text-gray-800 mb-2">Public API Downloader</h1>
            <p class="text-gray-500 mb-8">Powered by the decentralized Invidious API Network. No CORS blocks.</p>
            
            <div class="relative max-w-2xl mx-auto flex flex-col md:flex-row gap-3">
                <input type="text" id="url-input" 
                       class="w-full border-2 border-blue-200 focus:border-blue-500 rounded-lg px-4 py-4 outline-none transition-all text-gray-700 font-medium" 
                       placeholder="Paste YouTube link here (e.g., https://youtube.com/watch?v=...)">
                <button id="search-btn" class="bg-blue-500 hover:bg-blue-600 text-white font-bold py-4 px-8 rounded-lg transition-colors flex items-center justify-center gap-2 min-w-[160px]">
                    <span id="btn-text">Extract File</span>
                    <div id="btn-spinner" class="loader hidden"></div>
                </button>
            </div>
            
            <!-- Live API Status text -->
            <p id="status-text" class="text-sm font-semibold mt-4 text-blue-500 hidden"></p>
            <p id="error-text" class="text-sm font-semibold mt-4 text-red-500 hidden"></p>
        </div>

        <!-- Result Section (Initially Hidden) -->
        <div id="result-section" class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 hidden animation-fade-in">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                
                <!-- Left: Thumbnail & Meta -->
                <div class="md:col-span-1 flex flex-col items-center">
                    <img id="video-thumb" src="" alt="Thumbnail" class="w-full rounded-lg shadow-sm mb-4 border border-gray-200">
                    <h3 id="video-title" class="font-bold text-gray-800 text-center text-md leading-snug line-clamp-2 mb-2"></h3>
                    <p id="active-node-tag" class="text-xs text-blue-600 font-bold bg-blue-50 px-3 py-1 rounded-full border border-blue-200 mt-2"></p>
                </div>

                <!-- Right: Tables & Tabs -->
                <div class="md:col-span-2">
                    
                    <!-- Tabs -->
                    <div class="flex border-b border-gray-200 mb-4">
                        <button id="tab-video" class="py-3 px-6 font-semibold nav-active transition-colors w-1/2">Video (.mp4)</button>
                        <button id="tab-audio" class="py-3 px-6 font-semibold text-gray-500 hover:text-blue-500 transition-colors w-1/2">Audio (.m4a / .mp3)</button>
                    </div>

                    <!-- Video Table -->
                    <div id="table-video" class="overflow-x-auto">
                        <table class="w-full text-left border-collapse">
                            <thead>
                                <tr class="bg-gray-50 border-b border-gray-200">
                                    <th class="py-3 px-4 font-semibold text-gray-600">Resolution</th>
                                    <th class="py-3 px-4 font-semibold text-gray-600">Format</th>
                                    <th class="py-3 px-4 font-semibold text-gray-600 text-right">Download</th>
                                </tr>
                            </thead>
                            <tbody id="video-tbody"></tbody>
                        </table>
                    </div>

                    <!-- Audio Table -->
                    <div id="table-audio" class="overflow-x-auto hidden">
                        <table class="w-full text-left border-collapse">
                            <thead>
                                <tr class="bg-gray-50 border-b border-gray-200">
                                    <th class="py-3 px-4 font-semibold text-gray-600">Quality</th>
                                    <th class="py-3 px-4 font-semibold text-gray-600">Format</th>
                                    <th class="py-3 px-4 font-semibold text-gray-600 text-right">Download</th>
                                </tr>
                            </thead>
                            <tbody id="audio-tbody"></tbody>
                        </table>
                    </div>

                </div>
            </div>
        </div>
    </main>

    <script>
        // List of reliable public API nodes (Invidious instances that allow CORS)
        const PUBLIC_NODES = [
            "vid.puffyan.us",
            "inv.tux.pizza",
            "invidious.nerdvpn.de",
            "invidious.protokolla.fi"
        ];

        // Tab UI Logic
        const tabVideo = document.getElementById('tab-video');
        const tabAudio = document.getElementById('tab-audio');
        const tableVideo = document.getElementById('table-video');
        const tableAudio = document.getElementById('table-audio');

        tabVideo.onclick = () => {
            tabVideo.classList.add('nav-active', 'text-blue-500'); tabVideo.classList.remove('text-gray-500');
            tabAudio.classList.remove('nav-active', 'text-blue-500'); tabAudio.classList.add('text-gray-500');
            tableVideo.classList.remove('hidden'); tableAudio.classList.add('hidden');
        };

        tabAudio.onclick = () => {
            tabAudio.classList.add('nav-active', 'text-blue-500'); tabAudio.classList.remove('text-gray-500');
            tabVideo.classList.remove('nav-active', 'text-blue-500'); tabVideo.classList.add('text-gray-500');
            tableAudio.classList.remove('hidden'); tableAudio.classList.add('hidden');
        };

        // UI Elements
        const searchBtn = document.getElementById('search-btn');
        const urlInput = document.getElementById('url-input');
        const resultSection = document.getElementById('result-section');
        const statusText = document.getElementById('status-text');
        const errorText = document.getElementById('error-text');

        // Regex to pull YouTube Video ID
        function getYouTubeID(url) {
            const regExp = /^(?:https?:\/\/)?(?:www\.)?(?:youtube\.com\/(?:[^\/\n\s]+\/\S+\/|(?:v|e(?:mbed)?)\/|\S*?[?&]v=)|youtu\.be\/)([a-zA-Z0-9_-]{11})/;
            const match = url.match(regExp);
            return match ? match[1] : null;
        }

        // Main Execution
        searchBtn.addEventListener('click', async () => {
            const url = urlInput.value.trim();
            const videoId = getYouTubeID(url);
            
            if (!videoId) return alert("Please enter a valid YouTube Video URL.");

            // Reset UI
            searchBtn.disabled = true;
            document.getElementById('btn-text').textContent = "Scanning APIs...";
            document.getElementById('btn-spinner').classList.remove('hidden');
            resultSection.classList.add('hidden');
            errorText.classList.add('hidden');
            statusText.classList.remove('hidden');

            let successfulData = null;
            let activeNode = null;

            // Failover Loop: Cycles through public servers until it finds a working one
            for (let i = 0; i < PUBLIC_NODES.length; i++) {
                const node = PUBLIC_NODES[i];
                statusText.textContent = `Connecting to public node: ${node} (${i + 1}/${PUBLIC_NODES.length})...`;
                
                try {
                    const response = await fetch(`https://${node}/api/v1/videos/${videoId}`);
                    if (!response.ok) continue; // If node rejects it, skip to next

                    const data = await response.json();
                    
                    if (data && data.title) {
                        successfulData = data;
                        activeNode = node;
                        break; // Success! Exit loop.
                    }
                } catch (error) {
                    console.log(`Node ${node} blocked by CORS or offline. Rolling over...`);
                    // Continues to the next node automatically
                }
            }

            // Processing result
            if (successfulData && activeNode) {
                statusText.classList.add('hidden');
                renderUI(successfulData, activeNode, videoId);
            } else {
                statusText.classList.add('hidden');
                errorText.textContent = "All public API nodes are currently busy or offline. Please try again in a minute.";
                errorText.classList.remove('hidden');
            }

            // Restore Search Button
            searchBtn.disabled = false;
            document.getElementById('btn-text').textContent = "Extract File";
            document.getElementById('btn-spinner').classList.add('hidden');
        });

        // Parse Data & Build Links
        function renderUI(data, node, videoId) {
            document.getElementById('video-title').textContent = data.title;
            // Native Thumbnail
            document.getElementById('video-thumb').src = `https://img.youtube.com/vi/${videoId}/mqdefault.jpg`;
            document.getElementById('active-node-tag').textContent = `Node: ${node}`;

            const tbodyVideo = document.getElementById('video-tbody');
            const tbodyAudio = document.getElementById('audio-tbody');
            tbodyVideo.innerHTML = ''; 
            tbodyAudio.innerHTML = '';

            // Extract Video (MP4 formats containing both audio and video)
            if (data.formatStreams) {
                // Usually itag 22 is 720p, itag 18 is 360p
                const videoStreams = data.formatStreams.filter(stream => stream.type.includes('video/mp4'));
                
                videoStreams.forEach(stream => {
                    // Proxies the stream through the Invidious Node to avoid Google IP Blocks
                    const proxyUrl = `https://${node}/latest_version?id=${videoId}&itag=${stream.itag}&local=true`;
                    const quality = stream.resolution || stream.qualityLabel || 'Standard';
                    
                    tbodyVideo.innerHTML += generateRow(quality, 'MP4', proxyUrl);
                });
            }

            // Extract Audio Only 
            if (data.adaptiveFormats) {
                const audioStreams = data.adaptiveFormats.filter(stream => stream.type.includes('audio/mp4') || stream.type.includes('audio/webm'));
                
                audioStreams.forEach(stream => {
                    const proxyUrl = `https://${node}/latest_version?id=${videoId}&itag=${stream.itag}&local=true`;
                    const format = stream.type.includes('mp4') ? 'M4A' : 'WebM';
                    const bitrate = stream.bitrate ? Math.round(stream.bitrate / 1000) + ' kbps' : 'Standard';
                    
                    tbodyAudio.innerHTML += generateRow(bitrate, format, proxyUrl);
                });
            }

            resultSection.classList.remove('hidden');
        }

        // Build the Table Row
        function generateRow(quality, format, downloadUrl) {
            return `
                <tr class="border-b border-gray-100 hover:bg-gray-50 transition-colors">
                    <td class="py-4 px-4 font-bold text-gray-800">${quality}</td>
                    <td class="py-4 px-4 text-sm text-gray-500 font-medium">${format}</td>
                    <td class="py-3 px-4 text-right flex justify-end">
                        <a href="${downloadUrl}" target="_blank" download class="bg-blue-500 text-white px-5 py-2 rounded-lg font-bold flex items-center justify-center gap-2 hover:bg-blue-600 transition shadow-sm inline-block">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                            Save
                        </a>
                    </td>
                </tr>
            `;
        }
    </script>
</body>
</html>
