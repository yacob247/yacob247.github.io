<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
  <meta content="index, follow, max-image-preview:large" name="robots"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مكتبة الموسوعة | Encyclopedia Hub</title>
<meta name="description" content="البوابة الرئيسية لملفات ومجلدات موسوعة د. عدنان إبراهيم.">

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400;1,700&family=Cairo:wght@300;400;500;600;700;800;900&family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>

<style>
  :root {
    --bg-body: #0a0c10;
    --bg-surface: #11151d;
    --bg-card: #181d29;
    --bg-card-hover: #1f2535;
    --text-primary: #e8eaf0;
    --text-secondary: #9ba3b8;
    --accent-gold: #c9a84c;
    --accent-gold-light: #e8c96a;
    --accent-red: #c0392b;
    --border-subtle: rgba(255,255,255,0.05);
    --border-medium: rgba(255,255,255,0.1);
    --font-serif: 'Amiri', serif;
    --font-sans: 'Cairo', sans-serif;
  }

  body {
    background-color: var(--bg-body);
    color: var(--text-primary);
    font-family: var(--font-sans);
    min-height: 100vh;
    background-image: 
      radial-gradient(ellipse at top right, rgba(201,168,76,0.05) 0%, transparent 50%),
      radial-gradient(ellipse at bottom left, rgba(192,57,43,0.03) 0%, transparent 50%);
  }

  h1, h2, h3, h4 { font-family: var(--font-serif); }
  
  .folder-card {
    background-color: var(--bg-surface);
    border: 1px solid var(--border-medium);
    transition: all 0.3s ease;
  }
  
  .folder-card:hover {
    border-color: rgba(201,168,76,0.3);
    box-shadow: 0 10px 30px -10px rgba(0,0,0,0.5);
    transform: translateY(-2px);
  }

  .folder-header { cursor: pointer; }
  
  .folder-icon { transition: transform 0.3s ease; }
  .folder-card.open .folder-icon { transform: rotate(-90deg); } /* Arrow rotation */
  .folder-card.open { border-color: var(--accent-gold); }

  .file-list-container {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .file-item {
    background-color: var(--bg-card);
    border: 1px solid var(--border-subtle);
    transition: all 0.2s ease;
  }
  
  .file-item:hover {
    background-color: var(--bg-card-hover);
    border-color: rgba(201,168,76,0.2);
    padding-right: 1.5rem; /* Slight indent on hover */
  }

  /* Custom Scrollbar */
  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-track { background: var(--bg-body); }
  ::-webkit-scrollbar-thumb { background: var(--bg-card-hover); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--accent-gold); }
</style>
  <link href="https://envizion.work/Wiki/1/index.html" rel="canonical"/>
  <meta content="مكتبة الموسوعة | Encyclopedia Hub" property="og:title"/>
  <meta content="البوابة الرئيسية لملفات ومجلدات موسوعة د. عدنان إبراهيم." property="og:description"/>
  <meta content="website" property="og:type"/>
  <meta content="https://envizion.work/logo.png" property="og:image"/>
  <meta content="ca-pub-5812524294035974" name="google-adsense-account"/>
  <script async crossorigin="anonymous" src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5812524294035974"></script>
</head>
<body class="antialiased selection:bg-[#c9a84c] selection:text-black">

<div class="max-w-6xl mx-auto px-4 py-12 md:py-20">
  
  <!-- Header -->
  <header class="text-center mb-16">
    <div class="inline-flex items-center gap-2 px-4 py-1.5 rounded-full border border-[rgba(201,168,76,0.3)] bg-[rgba(201,168,76,0.05)] text-[#c9a84c] text-sm font-bold tracking-wider uppercase mb-6">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
      قاعدة البيانات المركزية
    </div>
    <h1 class="text-4xl md:text-6xl font-bold mb-4 text-[#e8eaf0]">فهرس <span class="text-[#c9a84c]">الموسوعة</span></h1>
    <p class="text-[#9ba3b8] max-w-2xl mx-auto text-lg">تصفح المجلدات أدناه للوصول إلى الملفات والمقالات والجلسات. انقر على أي مجلد لفتحه واستعراض محتوياته.</p>
  </header>

  <!-- Directory Container (Populated by JS) -->
  <main id="directory-container" class="space-y-6">
    <!-- Folders will be injected here -->
  </main>

</div>

<script>
  /**
   * DATABASE CONFIGURATION
   * Since browsers cannot auto-read local files, manage your folders and files here.
   * To add a new file, simply add a new object to the `files` array of the respective folder:
   * { title: "Your Header Title", filename: "your-file.html" }
   */
  const fileSystem = [
    {
      id: "folder-podcasts",
      title: "بودكاست وجلسات د. عدنان إبراهيم",
      subtitle: "Podcasts and Sessions of Adnan Ibrahim",
      icon: `<svg class="w-7 h-7 text-[#c9a84c]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"></path></svg>`,
      files: [
        { 
          title: "جلسة البودكاست الأولى", 
          filename: "1.html",
          description: "النقاش حول الأسس الفلسفية"
        },
        { 
          title: "جلسة البودكاست الثانية", 
          filename: "2.html",
          description: "تحليل معمق للتاريخ الإسلامي المبكر"
        }
      ]
    },
    {
      id: "folder-articles",
      title: "مقالات وأبحاث",
      subtitle: "Articles and Research Papers",
      icon: `<svg class="w-7 h-7 text-[#54a0ff]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>`,
      files: [
       
      ]
    }
  ];

  /**
   * Generates HTML for the file items inside a folder
   */
  function buildFilesHTML(files) {
    if (files.length === 0) {
      return `<div class="p-8 text-center text-[#6b7494] bg-[#181d29] rounded-b-xl border border-t-0 border-[rgba(255,255,255,0.05)]">المجلد فارغ حالياً (Folder is empty)</div>`;
    }

    let filesHTML = `<div class="p-4 md:p-6 bg-[rgba(10,12,16,0.5)] rounded-b-xl border border-t-0 border-[rgba(255,255,255,0.05)] grid gap-3">`;
    
    files.forEach(file => {
      filesHTML += `
        <div class="file-item rounded-lg p-4 flex flex-col md:flex-row md:items-center justify-between gap-4">
          <div class="flex items-start gap-4">
            <div class="mt-1 bg-[rgba(201,168,76,0.1)] p-2 rounded text-[#c9a84c]">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
            </div>
            <div>
              <h3 class="text-lg font-bold text-[#e8eaf0] mb-1">${file.title}</h3>
              <p class="text-sm text-[#6b7494] font-sans">${file.filename} &mdash; ${file.description || ''}</p>
            </div>
          </div>
          <a href="${file.filename}" target="_blank" rel="noopener noreferrer" class="shrink-0 flex items-center justify-center gap-2 bg-[#1f2535] hover:bg-[#c9a84c] text-[#e8eaf0] hover:text-[#0a0c10] transition-colors duration-300 font-bold py-2 px-5 rounded-md text-sm border border-[rgba(255,255,255,0.1)] hover:border-[#c9a84c]">
            فتح الملف
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path></svg>
          </a>
        </div>
      `;
    });

    filesHTML += `</div>`;
    return filesHTML;
  }

  /**
   * Main function to render all folders to the DOM
   */
  function renderDirectory() {
    const container = document.getElementById('directory-container');
    
    fileSystem.forEach(folder => {
      // Create folder card wrapper
      const folderCard = document.createElement('div');
      folderCard.className = 'folder-card rounded-xl flex flex-col';
      folderCard.id = folder.id;
      
      // Folder Header (Clickable)
      const folderHeader = document.createElement('div');
      folderHeader.className = 'folder-header p-5 md:p-6 flex items-center justify-between gap-4 select-none';
      folderHeader.onclick = () => toggleFolder(folder.id);
      
      folderHeader.innerHTML = `
        <div class="flex items-center gap-4 md:gap-6">
          <div class="w-14 h-14 rounded-full bg-[rgba(201,168,76,0.05)] border border-[rgba(201,168,76,0.2)] flex items-center justify-center shrink-0">
            ${folder.icon}
          </div>
          <div>
            <h2 class="text-xl md:text-2xl font-bold text-[#e8eaf0] mb-1">${folder.title}</h2>
            <p class="text-[#6b7494] text-sm font-sans tracking-wide">${folder.subtitle} &bull; ${folder.files.length} ملفات</p>
          </div>
        </div>
        <div class="folder-icon text-[#9ba3b8] shrink-0 bg-[rgba(255,255,255,0.03)] p-3 rounded-full">
          <svg class="w-6 h-6 transform rotate-180" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
        </div>
      `;

      // File List Container (Collapsible)
      const filesContainer = document.createElement('div');
      filesContainer.className = 'file-list-container';
      
      // We wrap the content in a div to calculate the real height for the CSS max-height transition
      const filesContent = document.createElement('div');
      filesContent.className = 'files-content-wrapper';
      filesContent.innerHTML = buildFilesHTML(folder.files);
      
      filesContainer.appendChild(filesContent);
      
      // Append everything
      folderCard.appendChild(folderHeader);
      folderCard.appendChild(filesContainer);
      container.appendChild(folderCard);
    });
  }

  /**
   * Toggles the accordion open/closed state
   */
  function toggleFolder(folderId) {
    const card = document.getElementById(folderId);
    const container = card.querySelector('.file-list-container');
    const contentWrapper = card.querySelector('.files-content-wrapper');
    
    // Check if currently open
    if (card.classList.contains('open')) {
      // Close it
      card.classList.remove('open');
      container.style.maxHeight = '0px';
    } else {
      // Open it
      card.classList.add('open');
      // Set max-height to the exact scrollHeight of the inner content to allow smooth CSS transition
      container.style.maxHeight = contentWrapper.scrollHeight + 'px';
      
      // If window resizes, we might need to recalculate this in a production app,
      // but for this simple hub, updating on click is sufficient.
    }
  }

  // Initialize on load
  window.onload = () => {
    renderDirectory();
    
    // Optionally open the first folder by default
    setTimeout(() => {
      if(fileSystem.length > 0) {
        toggleFolder(fileSystem[0].id);
      }
    }, 100);
  };

  // Recalculate heights on window resize so open folders don't get cut off
  window.addEventListener('resize', () => {
    document.querySelectorAll('.folder-card.open .file-list-container').forEach(container => {
      const contentWrapper = container.querySelector('.files-content-wrapper');
      container.style.maxHeight = contentWrapper.scrollHeight + 'px';
    });
  });
</script>
</body>
</html>
