<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/png" href="/logo.png">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TrendScope Profile</title>
  <meta name="description" content="Local TrendScope profile page for creators, celebrities, historical figures, and subjects.">
  <link rel="stylesheet" href="styles.css">
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5812524294035974" crossorigin="anonymous"></script>
</head>
<body data-page="profile">
  <header class="site-header">
    <a class="brand" href="index.html"><span>TrendScope</span> Profiles</a>
    <nav aria-label="Primary navigation">
      <a href="index.html">Dashboard</a>
      <a href="people.html">People</a>
      <a href="news.html">Culture</a>
      <a href="topics.html">Search</a>
    </nav>
  </header>
  <main>
    <section class="page-title">
      <p class="eyebrow" id="profile-category">Profile</p>
      <h1 id="profile-title">Loading profile</h1>
      <p class="lead" id="profile-summary"></p>
      <div class="meta" id="profile-tags"></div>
    </section>

    <div class="ad-wrap">
      <span>Advertisement</span>
      <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-5812524294035974" data-ad-slot="1079715089" data-ad-format="auto" data-full-width-responsive="true"></ins>
    </div>

    <section class="grid two">
      <article class="panel">
        <div class="panel-head"><p class="eyebrow">Overview</p><h2>About</h2></div>
        <p class="summary" id="profile-overview"></p>
      </article>
      <article class="panel">
        <div class="panel-head"><p class="eyebrow">Research angle</p><h2>Why it matters</h2></div>
        <p class="summary" id="profile-why"></p>
      </article>
    </section>

    <section class="panel wide">
      <div class="panel-head"><p class="eyebrow">Study prompts</p><h2>Questions to explore</h2></div>
      <ul class="angle-list" id="profile-angles"></ul>
    </section>

    <section class="panel wide">
      <div class="panel-head"><p class="eyebrow">Related</p><h2>More in this category</h2></div>
      <div id="related-profiles" class="cards loading">Loading related profiles...</div>
    </section>

    <div class="ad-wrap">
      <span>Advertisement</span>
      <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-5812524294035974" data-ad-slot="1187710073" data-ad-format="auto" data-full-width-responsive="true"></ins>
    </div>

  <script src="profiles.js"></script>
  <script src="app.js" defer></script>
