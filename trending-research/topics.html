<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/png" href="/logo.png">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Topic Research Lab - TrendScope</title>
  <meta name="description" content="Search the local TrendScope library of creators, celebrities, historical figures, and subjects.">
  <link rel="stylesheet" href="styles.css">
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5812524294035974" crossorigin="anonymous"></script>
</head>
<body data-page="topics">
  <header class="site-header">
    <a class="brand" href="index.html"><span>TrendScope</span> Research</a>
    <nav aria-label="Primary navigation">
      <a href="index.html">Dashboard</a>
      <a href="people.html">People</a>
      <a href="news.html">News</a>
      <a href="topics.html">Topic Lab</a>
      <a href="research.html">Research</a>
    </nav>
  </header>
  <main>
    <section class="page-title">
      <p class="eyebrow">Topic lab</p>
      <h1>Search your local profile library.</h1>
      <form class="search-bar" data-topic-form>
        <input name="q" id="topic-input" type="search" placeholder="Try: Taylor Swift, OpenAI, NBA Finals, election, climate..." autocomplete="off">
        <button type="submit">Research</button>
      </form>
    </section>
    <div class="ad-wrap"><span>Advertisement</span><ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-5812524294035974" data-ad-slot="1079715089" data-ad-format="auto" data-full-width-responsive="true"></ins></div>
    <div id="local-category-tabs" class="tabs"></div>
    <section class="grid two">
      <article class="panel">
        <div class="panel-head"><p class="eyebrow">Results</p><h2>Matching profiles</h2></div>
        <div id="topic-news" class="list muted">Enter a topic above.</div>
      </article>
      <article class="panel">
        <div class="panel-head"><p class="eyebrow">Cards</p><h2>Quick profile cards</h2></div>
        <div id="topic-context" class="list muted">Enter a topic above.</div>
      </article>
    </section>
    <div class="ad-wrap"><span>Advertisement</span><ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-5812524294035974" data-ad-slot="1187710073" data-ad-format="auto" data-full-width-responsive="true"></ins></div>
  </main>
  <script src="profiles.js"></script>
  <script src="app.js" defer></script>
</body>
</html>
