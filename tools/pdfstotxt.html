<title>Local PDF Text Extractor</title>

<style>
:root{--ink:#102033;--muted:#66758a;--line:#dce5f2;--bg:#f4f7fb;--blue:#216bff;--green:#10b981;--red:#ef4444;--panel:#fff}
*{box-sizing:border-box}
body{margin:0;font-family:Arial,system-ui,sans-serif;background:var(--bg);color:var(--ink)}
.wrap{max-width:1180px;margin:0 auto;padding:24px}
.top{display:flex;justify-content:space-between;gap:16px;align-items:flex-start;margin-bottom:16px}
h1{margin:0 0 6px;font-size:30px;letter-spacing:0}
p{margin:0;color:var(--muted);line-height:1.5}
.grid{display:grid;grid-template-columns:360px minmax(0,1fr);gap:16px}
.panel{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:16px;box-shadow:0 12px 32px rgba(16,32,51,.06)}
.drop{border:2px dashed #b8c7dc;border-radius:10px;min-height:170px;display:grid;place-items:center;text-align:center;padding:20px;background:#f8fbff;cursor:pointer}
.drop.drag{border-color:var(--blue);background:#eef5ff}
input[type=file]{display:none}
.btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}
button{border:1px solid var(--line);background:#fff;color:var(--ink);border-radius:8px;padding:10px 12px;font-weight:700;cursor:pointer}
button.primary{border-color:var(--blue);background:var(--blue);color:#fff}
button.good{border-color:var(--green);background:#ecfdf5;color:#047857}
button:disabled{opacity:.5;cursor:not-allowed}
.meta{font-size:13px;color:var(--muted);font-weight:700;margin-top:10px}
.log{height:210px;overflow:auto;background:#0b1220;color:#d7e2f2;border-radius:8px;padding:10px;font:12px Consolas,monospace;margin-top:12px}
.ok{color:#86efac}.err{color:#fca5a5}.info{color:#93c5fd}
label{display:block;font-size:12px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin:12px 0 6px}
textarea{width:100%;min-height:520px;resize:vertical;border:1px solid var(--line);border-radius:8px;padding:12px;font:12px Consolas,monospace;line-height:1.45;color:#102033}
.output-actions{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
.progress{height:8px;background:#dbe6f5;border-radius:999px;overflow:hidden;margin-top:12px}
.bar{height:100%;width:0;background:var(--blue);transition:width .2s ease}
@media(max-width:850px){.grid{grid-template-columns:1fr}.top{display:block}}
</style>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5812524294035974" crossorigin="anonymous"></script>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5812524294035974" crossorigin="anonymous"></script>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5812524294035974" crossorigin="anonymous"></script>
</head>
<body>
<main class="wrap">
  <div class="top">
    <div>
      <h1>Local PDF Text Extractor</h1>
      <p>Runs in this browser tab. No build, no module imports/exports, no server, no AI quota. Select or drop PDFs, then copy the extracted text or generated JSON.</p>
    </div>
  </div>

  <div class="grid">
    <section class="panel">
      <label>PDF files</label>
      <div class="drop" id="drop-zone">
        <div>
          <strong>Drop PDFs here</strong>
          <p>or click to choose files from Year 12 Material</p>
        </div>
      </div>
      <input id="file-input" type="file" accept="application/pdf,.pdf" multiple>
      <div class="meta" id="file-meta">No files selected.</div>
      <div class="progress"><div class="bar" id="bar"></div></div>
      <div class="btns">
        <button class="primary" id="extract-btn" disabled>Extract text</button>
        <button id="clear-btn">Clear</button>
      </div>
      <div class="btns">
        <button class="good" id="copy-text-btn" disabled>Copy text</button>
        <button class="good" id="copy-json-btn" disabled>Copy JSON</button>
      </div>
      <button style="width:100%;margin-top:8px" id="download-btn" disabled>Download JSON</button>
      <div class="log" id="log">Waiting for PDFs...</div>
    </section>

    <section class="panel">
      <div class="output-actions">
        <button id="view-text-btn">Text output</button>
        <button id="view-json-btn">Course JSON output</button>
      </div>
      <label id="output-label">Extracted text</label>
      <textarea id="output" spellcheck="false" placeholder="Extracted text will appear here."></textarea>
    </section>
  </div>

</main>
