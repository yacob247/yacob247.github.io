<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HyperLive Pro | Intelligent Web IDE</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        ide: {
                            bg: '#1e1e1e',
                            sidebar: '#252526',
                            header: '#333333',
                            active: '#37373d',
                            border: '#454545',
                            text: '#cccccc',
                            accent: '#007acc'
                        }
                    }
                }
            }
        }
    </script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- JSZip for exporting -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background-color: #1e1e1e;
            color: #cccccc;
            overflow: hidden;
        }
        
        .font-mono { font-family: 'JetBrains Mono', monospace; }

        /* Custom Scrollbars */
        ::-webkit-scrollbar { width: 10px; height: 10px; }
        ::-webkit-scrollbar-track { background: #1e1e1e; }
        ::-webkit-scrollbar-thumb { background: #424242; border: 2px solid #1e1e1e; border-radius: 5px; }
        ::-webkit-scrollbar-thumb:hover { background: #4f4f4f; }

        /* Resizer */
        .resizer-x { width: 4px; cursor: col-resize; background: transparent; transition: background 0.2s; z-index: 10; }
        .resizer-x:hover, .resizer-x.active { background: #007acc; }

        /* File Explorer Items */
        .file-item { cursor: pointer; user-select: none; }
        .file-item:hover { background-color: #2a2d2e; }
        .file-item.active { background-color: #37373d; color: #ffffff; }

        /* Drag Overlay */
        #drag-overlay {
            opacity: 0; pointer-events: none; transition: opacity 0.2s;
            backdrop-filter: blur(4px); z-index: 9999;
        }
        body.drag-active #drag-overlay { opacity: 1; }

        /* Loader */
        .loader {
            border: 2px solid #333; border-top-color: #007acc;
            border-radius: 50%; width: 16px; height: 16px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Hide iframe default bg */
        iframe { background-color: #ffffff; }
    </style>
</head>
<body class="flex flex-col h-screen antialiased selection:bg-[#264f78]">

    <!-- Global Drag Overlay -->
    <div id="drag-overlay" class="fixed inset-0 bg-black/60 flex flex-col items-center justify-center">
        <div class="bg-ide-sidebar p-10 rounded-2xl border border-ide-border text-center shadow-2xl scale-110 transition-transform">
            <div class="bg-[#007acc]/20 p-6 rounded-full inline-block mb-4">
                <i data-lucide="folder-input" class="w-16 h-16 text-[#007acc]"></i>
            </div>
            <h2 class="text-3xl font-bold text-white mb-2">Drop Folder to Mount</h2>
            <p class="text-gray-400">HyperLive will intelligently build your environment instantly.</p>
        </div>
    </div>

    <!-- Header -->
    <header class="h-10 bg-ide-header flex items-center justify-between px-4 border-b border-ide-border shrink-0 text-sm select-none">
        <div class="flex items-center gap-4">
            <div class="flex items-center gap-2 text-white font-semibold">
                <i data-lucide="zap" class="w-4 h-4 text-yellow-400 fill-yellow-400/20"></i>
                <span>HyperLive <span class="text-xs font-normal text-gray-400 ml-1">Intelligent IDE</span></span>
            </div>
            
            <div class="flex space-x-1 ml-4">
                <button onclick="triggerFolderUpload()" class="flex items-center gap-1.5 px-3 py-1 hover:bg-ide-active rounded transition text-gray-300 hover:text-white">
                    <i data-lucide="folder-open" class="w-3.5 h-3.5"></i> Open Folder
                </button>
                <button id="btn-download" onclick="exportZip()" class="hidden items-center gap-1.5 px-3 py-1 hover:bg-ide-active rounded transition text-gray-300 hover:text-white">
                    <i data-lucide="download" class="w-3.5 h-3.5"></i> Export ZIP
                </button>
                <input type="file" id="folder-input" class="hidden" webkitdirectory directory multiple onchange="handleFolderSelect(event)">
            </div>
        </div>

        <div class="flex items-center gap-3 text-xs text-gray-400">
            <span id="status-indicator" class="flex items-center gap-1.5">
                <span class="w-2 h-2 rounded-full bg-green-500 shadow-[0_0_8px_rgba(34,197,94,0.6)]"></span>
                Engine Ready
            </span>
        </div>
    </header>

    <!-- Main Workspace -->
    <div class="flex-1 flex overflow-hidden relative">
        
        <!-- Sidebar: Explorer -->
        <aside id="sidebar" class="w-64 bg-ide-sidebar flex flex-col border-r border-ide-border shrink-0" style="width: 250px;">
            <div class="h-9 px-4 flex items-center text-xs font-semibold uppercase tracking-wider text-gray-400 border-b border-ide-border">
                Explorer
            </div>
            <div id="file-tree" class="flex-1 overflow-y-auto py-2 text-sm font-mono">
                <div class="p-6 text-center text-gray-500 mt-10">
                    <i data-lucide="layout-grid" class="w-10 h-10 mx-auto mb-3 opacity-50"></i>
                    <p>No folder opened.</p>
                    <button onclick="triggerFolderUpload()" class="mt-4 px-4 py-1.5 bg-[#007acc] hover:bg-[#005f9e] text-white rounded-md transition font-sans text-xs">
                        Open Workspace
                    </button>
                    <button onclick="loadDemo()" class="mt-2 px-4 py-1.5 border border-ide-border hover:bg-ide-active text-gray-300 rounded-md transition font-sans text-xs block mx-auto w-[122px]">
                        Load Demo
                    </button>
                </div>
            </div>
        </aside>

        <div class="resizer-x" id="resizer-sidebar"></div>

        <!-- Center: Monaco Editor -->
        <main id="editor-pane" class="flex-1 flex flex-col min-w-[200px] bg-ide-bg relative">
            <div id="editor-tabs" class="flex bg-[#2d2d2d] border-b border-[#1e1e1e] overflow-x-auto h-9 shrink-0 scrollbar-none">
                <!-- Tabs injected here -->
            </div>
            
            <div class="flex-1 relative">
                <!-- Monaco Editor Container -->
                <div id="monaco-container" class="absolute inset-0"></div>
                
                <!-- Empty State -->
                <div id="editor-empty" class="absolute inset-0 flex items-center justify-center bg-ide-bg z-10 pointer-events-none">
                    <div class="text-center">
                        <i data-lucide="code-2" class="w-16 h-16 text-gray-600 mx-auto mb-4"></i>
                        <p class="text-gray-500 font-mono text-sm">Select a file to start coding</p>
                    </div>
                </div>
            </div>
        </main>

        <div class="resizer-x bg-ide-border" id="resizer-preview"></div>

        <!-- Right: Live Preview -->
        <aside id="preview-pane" class="w-[40%] min-w-[300px] flex flex-col bg-white shrink-0 relative">
            <!-- Browser Chrome -->
            <div class="h-10 bg-gray-100 border-b border-gray-300 flex items-center px-2 gap-2 shrink-0 select-none text-gray-600">
                <div class="flex gap-1.5 px-2">
                    <button class="hover:bg-gray-200 p-1 rounded" onclick="refreshPreview()"><i data-lucide="rotate-cw" class="w-3.5 h-3.5"></i></button>
                </div>
                <div class="flex-1 bg-white border border-gray-300 rounded-md h-6 flex items-center px-3 text-xs font-mono text-gray-500 shadow-inner">
                    <i data-lucide="lock" class="w-3 h-3 text-green-600 mr-2"></i>
                    <span id="address-bar">hyperlive://local/index.html</span>
                </div>
                <button class="hover:bg-gray-200 p-1.5 rounded text-gray-500 ml-1" title="Open Console" onclick="toggleConsole()"><i data-lucide="terminal" class="w-4 h-4"></i></button>
            </div>

            <!-- Frame Container -->
            <div class="flex-1 relative bg-white">
                <iframe id="live-frame" class="w-full h-full border-none" sandbox="allow-scripts allow-same-origin allow-forms allow-modals"></iframe>
            </div>

            <!-- Dev Console Panel -->
            <div id="console-panel" class="absolute bottom-0 left-0 right-0 h-48 bg-[#1e1e1e] border-t border-ide-border flex flex-col hidden z-20 shadow-2xl transition-all">
                <div class="h-8 bg-[#2d2d2d] flex items-center justify-between px-3 text-xs font-mono border-b border-[#1e1e1e]">
                    <span class="text-gray-300">Console</span>
                    <button onclick="toggleConsole()" class="hover:text-white text-gray-500"><i data-lucide="x" class="w-3.5 h-3.5"></i></button>
                </div>
                <div id="console-output" class="flex-1 overflow-y-auto p-2 font-mono text-[11px] space-y-1">
                    <!-- Logs -->
                </div>
            </div>
        </aside>

    </div>

    <!-- Firebase Configuration -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Required Firebase Setup for Environment (Silent Auth to satisfy constraints)
        const initFirebase = async () => {
            try {
                let config = {};
                if (typeof __firebase_config !== 'undefined') {
                    config = JSON.parse(__firebase_config);
                } else {
                    // Fallback stub to prevent errors if running locally outside platform
                    config = { apiKey: "stub", authDomain: "stub", projectId: "stub" };
                }
                
                const app = initializeApp(config);
                const auth = getAuth(app);
                
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth).catch(()=>console.log("Offline mode"));
                }
            } catch(e) { console.log("Running offline/local mode."); }
        };
        initFirebase();
    </script>

    <!-- Monaco Editor Loader & Core Logic -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.39.0/min/vs/loader.min.js"></script>
    <script>
        lucide.createIcons();

        // --------------------------------------------------------
        // STATE MANAGEMENT
        // --------------------------------------------------------
        let vfs = {}; // Virtual File System: { 'path/file.ext': { name, isText, content, fileObj, blobUrl } }
        let activeFile = null;
        let activeIframeFile = 'index.html';
        let editor = null;
        let isMonacoReady = false;
        let saveTimeout = null;

        // --------------------------------------------------------
        // UI & RESIZERS
        // --------------------------------------------------------
        function setupResizers() {
            const resizerSidebar = document.getElementById('resizer-sidebar');
            const sidebar = document.getElementById('sidebar');
            const resizerPreview = document.getElementById('resizer-preview');
            const preview = document.getElementById('preview-pane');

            let isResizingSidebar = false;
            let isResizingPreview = false;

            resizerSidebar.addEventListener('mousedown', () => isResizingSidebar = true);
            resizerPreview.addEventListener('mousedown', () => isResizingPreview = true);

            document.addEventListener('mousemove', (e) => {
                if (!isResizingSidebar && !isResizingPreview) return;
                
                // Prevent iframe from capturing mouse events during drag
                document.getElementById('live-frame').style.pointerEvents = 'none';

                if (isResizingSidebar) {
                    let newWidth = e.clientX;
                    if (newWidth > 150 && newWidth < 500) sidebar.style.width = `${newWidth}px`;
                }
                if (isResizingPreview) {
                    let newWidth = window.innerWidth - e.clientX;
                    if (newWidth > 300 && newWidth < window.innerWidth - 300) preview.style.width = `${newWidth}px`;
                }
            });

            document.addEventListener('mouseup', () => {
                isResizingSidebar = false;
                isResizingPreview = false;
                document.getElementById('live-frame').style.pointerEvents = 'auto';
            });
        }
        setupResizers();

        function setStatus(text, type='normal') {
            const ind = document.getElementById('status-indicator');
            const color = type === 'normal' ? 'bg-green-500' : (type === 'working' ? 'bg-yellow-500' : 'bg-red-500');
            ind.innerHTML = `<span class="w-2 h-2 rounded-full ${color} shadow-[0_0_8px_rgba(0,0,0,0.5)]"></span>${text}`;
        }

        // --------------------------------------------------------
        // MONACO EDITOR INITIALIZATION
        // --------------------------------------------------------
        require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.39.0/min/vs' }});
        require(['vs/editor/editor.main'], function() {
            editor = monaco.editor.create(document.getElementById('monaco-container'), {
                value: '',
                language: 'html',
                theme: 'vs-dark',
                automaticLayout: true,
                minimap: { enabled: false },
                fontSize: 13,
                fontFamily: "'JetBrains Mono', monospace",
                scrollBeyondLastLine: false,
                roundedSelection: true,
                padding: { top: 16 }
            });

            isMonacoReady = true;

            // Intelligent Auto-Save & Hot Reload
            editor.onDidChangeModelContent(() => {
                if (!activeFile || !vfs[activeFile]) return;
                setStatus('Saving...', 'working');
                
                clearTimeout(saveTimeout);
                saveTimeout = setTimeout(() => {
                    vfs[activeFile].content = editor.getValue();
                    setStatus('Engine Ready', 'normal');
                    
                    // Only auto-reload if editing a web file
                    const ext = activeFile.split('.').pop().toLowerCase();
                    if (['html', 'htm', 'js', 'css'].includes(ext)) {
                        refreshPreview();
                    }
                }, 600); // 600ms debounce
            });
        });

        // --------------------------------------------------------
        // VIRTUAL FILE SYSTEM (VFS) & DRAG/DROP
        // --------------------------------------------------------
        const isTextBased = (name) => ['html', 'htm', 'css', 'js', 'json', 'txt', 'md', 'svg'].includes(name.split('.').pop().toLowerCase());
        
        function triggerFolderUpload() { document.getElementById('folder-input').click(); }

        document.body.addEventListener('dragover', e => { e.preventDefault(); document.body.classList.add('drag-active'); });
        document.body.addEventListener('dragleave', e => { e.preventDefault(); if (e.target.id === 'drag-overlay') document.body.classList.remove('drag-active'); });
        document.body.addEventListener('drop', async e => {
            e.preventDefault();
            document.body.classList.remove('drag-active');
            if (e.dataTransfer.items) {
                setStatus('Mounting...', 'working');
                vfs = {}; // Reset
                const items = Array.from(e.dataTransfer.items).filter(i => i.kind === 'file');
                for (let item of items) {
                    const entry = item.webkitGetAsEntry();
                    if (entry) await traverseFileTree(entry, "");
                }
                finalizeMount();
            }
        });

        async function handleFolderSelect(e) {
            const files = e.target.files;
            if (files.length === 0) return;
            setStatus('Mounting...', 'working');
            vfs = {};
            for (let file of files) {
                // webkitRelativePath contains the full path including root folder
                const pathParts = file.webkitRelativePath.split('/');
                pathParts.shift(); // Remove root folder name to make it relative to root
                const path = pathParts.join('/');
                if(path) {
                    await processFile(file, path, file.name);
                }
            }
            e.target.value = '';
            finalizeMount();
        }

        async function traverseFileTree(item, path) {
            if (item.isFile) {
                const file = await new Promise(resolve => item.file(resolve));
                await processFile(file, path + item.name, item.name);
            } else if (item.isDirectory) {
                const dirReader = item.createReader();
                const entries = await new Promise(resolve => dirReader.readEntries(resolve));
                for (let entry of entries) {
                    await traverseFileTree(entry, path + item.name + "/");
                }
            }
        }

        async function processFile(file, fullPath, name) {
            const isText = isTextBased(name);
            let content = null;
            let blobUrl = null;
            
            if (isText) {
                content = await file.text();
            } else {
                blobUrl = URL.createObjectURL(file); // Pre-generate secure local URLs for images/assets
            }

            vfs[fullPath] = { name, isText, content, fileObj: file, blobUrl };
        }

        function finalizeMount() {
            renderFileTree();
            document.getElementById('btn-download').classList.remove('hidden');
            document.getElementById('btn-download').classList.add('flex');
            
            // Intelligent Entry Point Detection
            let entryPoint = Object.keys(vfs).find(p => p.toLowerCase() === 'index.html');
            if (!entryPoint) entryPoint = Object.keys(vfs).find(p => p.toLowerCase() === 'main.html');
            if (!entryPoint) entryPoint = Object.keys(vfs).find(p => p.toLowerCase().endsWith('.html'));
            
            if (entryPoint) {
                openFile(entryPoint);
                activeIframeFile = entryPoint;
                refreshPreview();
            } else if (Object.keys(vfs).length > 0) {
                // If no HTML, just open the first text file
                const firstText = Object.keys(vfs).find(p => vfs[p].isText);
                if (firstText) openFile(firstText);
            }
            
            setStatus('Engine Ready', 'normal');
        }

        // --------------------------------------------------------
        // FILE TREE UI
        // --------------------------------------------------------
        function renderFileTree() {
            const container = document.getElementById('file-tree');
            container.innerHTML = '';
            
            if (Object.keys(vfs).length === 0) return;

            // Build structural hierarchy
            const tree = { dirs: {}, files: [] };
            Object.keys(vfs).forEach(path => {
                const parts = path.split('/');
                let current = tree;
                for (let i = 0; i < parts.length - 1; i++) {
                    if (!current.dirs[parts[i]]) current.dirs[parts[i]] = { dirs: {}, files: [] };
                    current = current.dirs[parts[i]];
                }
                current.files.push({ name: parts[parts.length - 1], path });
            });

            // Recursive DOM builder
            function buildHTML(node, containerNode, depth) {
                // Render directories
                Object.keys(node.dirs).sort().forEach(dirName => {
                    const dirDiv = document.createElement('div');
                    
                    const header = document.createElement('div');
                    header.className = "flex items-center gap-1.5 py-1 px-2 text-gray-300 hover:text-white file-item";
                    header.style.paddingLeft = `${depth * 12 + 8}px`;
                    header.innerHTML = `<i data-lucide="chevron-right" class="w-3.5 h-3.5 text-gray-500 transition-transform"></i><i data-lucide="folder" class="w-4 h-4 text-blue-400 fill-blue-400/20"></i><span>${dirName}</span>`;
                    
                    const children = document.createElement('div');
                    children.className = "hidden"; // Start collapsed
                    
                    header.onclick = () => {
                        const icon = header.querySelector('[data-lucide="chevron-right"]');
                        if (children.classList.contains('hidden')) {
                            children.classList.remove('hidden');
                            icon.style.transform = 'rotate(90deg)';
                        } else {
                            children.classList.add('hidden');
                            icon.style.transform = 'rotate(0deg)';
                        }
                    };
                    
                    dirDiv.appendChild(header);
                    dirDiv.appendChild(children);
                    containerNode.appendChild(dirDiv);
                    buildHTML(node.dirs[dirName], children, depth + 1);
                });

                // Render files
                node.files.sort((a,b) => a.name.localeCompare(b.name)).forEach(file => {
                    const el = document.createElement('div');
                    el.className = `flex items-center gap-2 py-1 px-2 text-gray-400 file-item ${activeFile === file.path ? 'active' : ''}`;
                    el.style.paddingLeft = `${depth * 12 + 24}px`;
                    el.id = `tree-node-${file.path.replace(/[^a-zA-Z0-9]/g, '-')}`;
                    
                    let icon = 'file'; let color = 'text-gray-400';
                    const ext = file.name.split('.').pop().toLowerCase();
                    if (ext === 'html') { icon = 'file-code-2'; color = 'text-orange-400'; }
                    else if (ext === 'css') { icon = 'file-type-2'; color = 'text-blue-400'; }
                    else if (ext === 'js') { icon = 'file-json'; color = 'text-yellow-400'; }
                    else if (['png','jpg','svg'].includes(ext)) { icon = 'image'; color = 'text-green-400'; }

                    el.innerHTML = `<i data-lucide="${icon}" class="w-4 h-4 ${color}"></i><span class="truncate">${file.name}</span>`;
                    el.onclick = () => openFile(file.path);
                    containerNode.appendChild(el);
                });
            }

            buildHTML(tree, container, 0);
            lucide.createIcons();
        }

        // --------------------------------------------------------
        // EDITOR OPERATIONS
        // --------------------------------------------------------
        function openFile(path) {
            if (!vfs[path]) return;
            activeFile = path;
            
            // Update Tree UI
            document.querySelectorAll('.file-item').forEach(el => el.classList.remove('active'));
            const activeNode = document.getElementById(`tree-node-${path.replace(/[^a-zA-Z0-9]/g, '-')}`);
            if (activeNode) activeNode.classList.add('active');

            // Render Tab
            const tabs = document.getElementById('editor-tabs');
            tabs.innerHTML = `
                <div class="flex items-center gap-2 px-3 py-1.5 bg-[#1e1e1e] text-white border-t-2 border-[#007acc] min-w-[120px] max-w-[200px] cursor-default border-r border-[#2d2d2d]">
                    <span class="truncate text-xs font-mono">${vfs[path].name}</span>
                </div>
            `;

            // Setup Editor
            if (vfs[path].isText) {
                document.getElementById('editor-empty').classList.add('hidden');
                if (isMonacoReady) {
                    const ext = path.split('.').pop().toLowerCase();
                    const langMap = { 'js': 'javascript', 'html': 'html', 'css': 'css', 'json': 'json' };
                    monaco.editor.setModelLanguage(editor.getModel(), langMap[ext] || 'plaintext');
                    editor.setValue(vfs[path].content || '');
                } else {
                    // Fallback if monaco is slow to load
                    setTimeout(() => openFile(path), 100);
                }
            } else {
                // It's an image or binary
                document.getElementById('editor-empty').classList.remove('hidden');
                document.getElementById('editor-empty').innerHTML = `
                    <div class="text-center">
                        <img src="${vfs[path].blobUrl}" class="max-w-xs max-h-48 mx-auto mb-4 rounded shadow-lg border border-[#333]">
                        <p class="text-gray-500 font-mono text-sm">${vfs[path].name}</p>
                    </div>
                `;
            }
            
            // Auto navigate preview if it's an HTML file
            if (path.endsWith('.html') || path.endsWith('.htm')) {
                activeIframeFile = path;
                refreshPreview();
            }
        }

        // --------------------------------------------------------
        // VFS COMPILER (The "Intelligence")
        // --------------------------------------------------------
        function resolveRelative(basePath, relative) {
            if (/^(http|https|data:|#)/.test(relative)) return relative;
            const stack = basePath.split('/');
            stack.pop(); // remove current file
            const parts = relative.split('/');
            for (let p of parts) {
                if (p === '.') continue;
                if (p === '..') stack.pop();
                else stack.push(p);
            }
            return stack.join('/');
        }

        function compileVFS(targetHtmlPath) {
            const file = vfs[targetHtmlPath];
            if (!file || !file.isText) return "<h1>404 File Not Found</h1>";

            const parser = new DOMParser();
            const doc = parser.parseFromString(file.content, 'text/html');

            // 1. Resolve CSS links intelligently
            doc.querySelectorAll('link[rel="stylesheet"]').forEach(link => {
                const href = link.getAttribute('href');
                if (href) {
                    const absPath = resolveRelative(targetHtmlPath, href);
                    if (vfs[absPath]) {
                        const style = doc.createElement('style');
                        style.textContent = vfs[absPath].content;
                        link.replaceWith(style);
                    }
                }
            });

            // 2. Resolve Images & Media using Pre-generated Blob URLs
            doc.querySelectorAll('img, audio, video, source').forEach(el => {
                const src = el.getAttribute('src');
                if (src) {
                    const absPath = resolveRelative(targetHtmlPath, src);
                    if (vfs[absPath] && vfs[absPath].blobUrl) {
                        el.setAttribute('src', vfs[absPath].blobUrl);
                    }
                }
            });

            // 3. Resolve internal Scripts
            doc.querySelectorAll('script').forEach(script => {
                const src = script.getAttribute('src');
                if (src) {
                    const absPath = resolveRelative(targetHtmlPath, src);
                    if (vfs[absPath]) {
                        const inlineScript = doc.createElement('script');
                        // Inject script but wrap to prevent context leakage
                        inlineScript.textContent = `
                        try {
                            ${vfs[absPath].content}
                        } catch(e) { console.error("Error in ${absPath}:", e); }
                        `;
                        script.replaceWith(inlineScript);
                    }
                }
            });

            // 4. Inject Interceptor for internal <a> links to prevent real navigation leaving the iframe
            const routerScript = doc.createElement('script');
            routerScript.textContent = `
                document.addEventListener('click', function(e) {
                    const a = e.target.closest('a');
                    if (a) {
                        const href = a.getAttribute('href');
                        if (href && !href.startsWith('http') && !href.startsWith('#')) {
                            e.preventDefault();
                            window.parent.postMessage({ type: 'NAVIGATE', path: href, current: '${targetHtmlPath}' }, '*');
                        }
                    }
                });
                
                // Hook console to IDE
                const _log = console.log, _err = console.error;
                console.log = (...a) => { window.parent.postMessage({type:'LOG', val: a.join(' ')}, '*'); _log(...a); };
                console.error = (...a) => { window.parent.postMessage({type:'ERR', val: a.join(' ')}, '*'); _err(...a); };
                window.onerror = (m,s,l) => window.parent.postMessage({type:'ERR', val: m + ' at line ' + l}, '*');
            `;
            doc.head.insertBefore(routerScript, doc.head.firstChild);

            return doc.documentElement.outerHTML;
        }

        function refreshPreview() {
            if (!activeIframeFile) return;
            const iframe = document.getElementById('live-frame');
            document.getElementById('address-bar').innerText = `hyperlive://local/${activeIframeFile}`;
            
            // Compile and inject via srcdoc (modern, secure, instant)
            const html = compileVFS(activeIframeFile);
            iframe.srcdoc = html;
        }

        // Handle Iframe Messages
        window.addEventListener('message', (e) => {
            if (e.data.type === 'NAVIGATE') {
                const newPath = resolveRelative(e.data.current, e.data.path);
                // Strip hash/query
                const cleanPath = newPath.split(/[?#]/)[0];
                if (vfs[cleanPath]) {
                    activeIframeFile = cleanPath;
                    refreshPreview();
                    // Optionally switch editor to this file too
                    if(vfs[cleanPath].isText) openFile(cleanPath);
                } else {
                    logConsole(`404: Cannot route to ${cleanPath}`, true);
                }
            } else if (e.data.type === 'LOG') {
                logConsole(e.data.val);
            } else if (e.data.type === 'ERR') {
                logConsole(e.data.val, true);
            }
        });

        // --------------------------------------------------------
        // CONSOLE & UTILS
        // --------------------------------------------------------
        function toggleConsole() {
            const panel = document.getElementById('console-panel');
            panel.classList.toggle('hidden');
        }

        function logConsole(msg, isError=false) {
            const out = document.getElementById('console-output');
            const d = document.createElement('div');
            d.className = `border-b border-[#2d2d2d] pb-1 ${isError ? 'text-red-400' : 'text-gray-300'}`;
            d.innerText = `> ${msg}`;
            out.appendChild(d);
            out.scrollTop = out.scrollHeight;
        }

        async function exportZip() {
            if (Object.keys(vfs).length === 0) return;
            setStatus('Packing ZIP...', 'working');
            const zip = new JSZip();
            
            Object.keys(vfs).forEach(path => {
                if (vfs[path].fileObj) zip.file(path, vfs[path].fileObj);
                else zip.file(path, vfs[path].content);
            });

            const content = await zip.generateAsync({ type: "blob" });
            const url = URL.createObjectURL(content);
            const a = document.createElement('a');
            a.href = url; a.download = `HyperLive_Export.zip`;
            a.click();
            URL.revokeObjectURL(url);
            setStatus('Engine Ready', 'normal');
        }

        // Demo Loader
        function loadDemo() {
            vfs = {
                'index.html': { name: 'index.html', isText: true, content: `<!DOCTYPE html>\n<html>\n<head>\n  <link rel="stylesheet" href="styles.css">\n</head>\n<body>\n  <div class="card">\n    <h1>Welcome to HyperLive Pro</h1>\n    <p>Try editing this HTML, CSS, or JS. The preview updates instantly!</p>\n    <button id="btn">Click Me</button>\n    <p id="out"></p>\n  </div>\n  <script src="script.js"><\/script>\n</body>\n</html>`},
                'styles.css': { name: 'styles.css', isText: true, content: `body {\n  font-family: system-ui;\n  background: #f0f2f5;\n  display: grid;\n  place-items: center;\n  height: 100vh;\n  margin: 0;\n}\n.card {\n  background: white;\n  padding: 2rem;\n  border-radius: 12px;\n  box-shadow: 0 4px 6px rgba(0,0,0,0.1);\n  text-align: center;\n}\nbutton {\n  background: #007acc;\n  color: white;\n  border: none;\n  padding: 8px 16px;\n  border-radius: 6px;\n  cursor: pointer;\n}`},
                'script.js': { name: 'script.js', isText: true, content: `document.getElementById('btn').addEventListener('click', () => {\n  document.getElementById('out').innerText = "JavaScript is working!";\n  console.log("Button was clicked inside VFS!");\n});`}
            };
            finalizeMount();
        }

        // Init blank state
        setTimeout(() => { if(Object.keys(vfs).length===0) logConsole("Ready. Drop a folder or load the Demo."); }, 1000);
    </script>
</body>
</html>
