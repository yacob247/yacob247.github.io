<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>React JSX Live Viewer Pro</title>
  
  <!-- Tailwind for styling the IDE UI -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Babel Standalone for in-browser JSX transpilation -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    /* Styling for our lightweight code editor */
    #editor {
      tab-size: 2;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      line-height: 1.5;
    }
    
    /* Custom scrollbar for a darker, sleeker look */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: #1f2937; }
    ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #6b7280; }
  </style>
</head>
<body class="bg-gray-900 text-white h-screen flex flex-col overflow-hidden font-sans">

  <!-- IDE Header -->
  <header class="bg-gray-950 border-b border-gray-800 p-4 flex items-center justify-between shrink-0">
    <div class="flex items-center gap-3">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#61dafb" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="animate-[spin_4s_linear_infinite]">
        <circle cx="12" cy="12" r="2"></circle>
        <ellipse cx="12" cy="12" rx="10" ry="4" transform="rotate(30 12 12)"></ellipse>
        <ellipse cx="12" cy="12" rx="10" ry="4" transform="rotate(90 12 12)"></ellipse>
        <ellipse cx="12" cy="12" rx="10" ry="4" transform="rotate(150 12 12)"></ellipse>
      </svg>
      <div>
        <h1 class="font-bold text-lg tracking-tight">React JSX Live Viewer</h1>
        <p class="text-[10px] text-gray-500">Fixed & Enhanced Edition</p>
      </div>
    </div>
    <div class="flex items-center gap-3">
      <button id="copy-btn" class="bg-gray-800 hover:bg-gray-700 text-xs px-2 py-1 rounded border border-gray-700 transition">
        Copy Code
      </button>
      <div class="hidden sm:flex text-xs text-gray-400 items-center gap-2">
        <span class="bg-gray-800 px-2 py-1 rounded-md">100% Browser Native</span>
      </div>
    </div>
  </header>

  <!-- Main IDE Workspace -->
  <main class="flex-1 flex flex-col md:flex-row min-h-0">
    
    <!-- Code Editor Pane -->
    <div class="flex-1 flex flex-col border-r border-gray-800 bg-[#0d1117] min-h-[50%] md:min-h-0">
      <div class="bg-gray-800/50 px-4 py-2 text-xs font-mono text-gray-400 uppercase tracking-wider border-b border-gray-800 flex justify-between items-center shrink-0">
        <span>App.jsx</span>
        <span class="text-green-400 lowercase normal-case flex items-center gap-1">
          <div class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div> Ready & Compiling
        </span>
      </div>
      <!-- Textarea with built-in tab support -->
      <textarea 
        id="editor" 
        class="flex-1 w-full bg-transparent p-4 text-[13px] sm:text-sm text-gray-100 resize-none focus:outline-none focus:ring-0" 
        spellcheck="false"
        placeholder="Paste your React/JSX code here..."></textarea>
    </div>

    <!-- Live Preview Pane -->
    <div class="flex-1 relative flex flex-col bg-white">
      <div class="bg-gray-100 border-b border-gray-200 px-4 py-2 text-xs font-mono text-gray-500 uppercase tracking-wider flex justify-between items-center shrink-0">
        <span>Live Preview</span>
        <div class="flex gap-2">
          <button id="preview-bg-toggle" class="bg-gray-200 hover:bg-gray-300 text-gray-600 text-[10px] px-2 py-0.5 rounded border border-gray-300">
            Toggle Light/Dark Preview
          </button>
        </div>
      </div>
      
      <!-- Error Bar (Hidden by default) -->
      <div id="error-bar" class="hidden absolute top-10 left-0 right-0 bg-red-900/95 text-red-100 p-4 font-mono text-xs shadow-xl z-20 backdrop-blur-sm max-h-[40%] overflow-y-auto border-b border-red-700">
        <!-- Error messages injected here -->
      </div>

      <!-- Secure Iframe for execution -->
      <iframe id="preview" class="w-full h-full border-none bg-white transition-colors duration-200"></iframe>
    </div>
  </main>

  <script src="jsxviewer.js"></script>
</body>
</html>
