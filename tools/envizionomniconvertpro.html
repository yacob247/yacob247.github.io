<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniConvert Pro - Unified Power Converter</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#eef2ff', 100: '#e0e7ff', 500: '#6366f1',
                            600: '#4f46e5', 700: '#4338ca', 900: '#312e81',
                        }
                    }
                }
            }
        }
    </script>
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Robust Client-Side Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    <script src="https://unpkg.com/docx@7.3.0/build/index.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://raw.githack.com/eKoopmans/html2pdf.js/master/dist/html2pdf.bundle.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@ericblade/quagga2/dist/quagga.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <!-- PowerPoint Generation Engine -->
    <script src="https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen font-sans antialiased selection:bg-brand-500 selection:text-white">

    <!-- Header -->
    <header class="border-b border-slate-800 bg-slate-950/80 backdrop-blur sticky top-0 z-50">
        <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <div class="flex items-center space-x-3">
                <div class="bg-gradient-to-tr from-brand-600 to-indigo-500 p-2.5 rounded-xl shadow-lg">
                    <i class="fa-solid fa-wand-magic-sparkles text-xl text-white"></i>
                </div>
                <div>
                    <span class="font-extrabold text-xl tracking-tight text-white">OmniConvert <span class="text-brand-400">Pro</span></span>
                    <span class="text-[10px] block text-slate-400 font-medium uppercase tracking-widest">Unified local sandboxed engine</span>
                </div>
            </div>
            <div class="flex items-center space-x-2">
                <span class="px-2.5 py-1 rounded-full text-xs font-bold bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 flex items-center gap-1.5">
                    <span class="h-2 w-2 rounded-full bg-emerald-400 animate-ping"></span>
                    100% Client-Side
                </span>
            </div>
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-4 py-10">
        
        <!-- Selection Hub with Dropdowns and Flip -->
        <div class="bg-slate-950 border border-slate-800 rounded-3xl p-6 sm:p-10 shadow-2xl relative mb-8">
            <div class="flex flex-col md:flex-row items-center justify-center space-y-6 md:space-y-0 md:space-x-8">
                
                <!-- Source Format Dropdown -->
                <div class="flex-1 w-full relative">
                    <label class="block text-xs font-bold text-slate-400 mb-2 uppercase tracking-wider"><i class="fa-solid fa-file-import mr-1"></i> Source Format</label>
                    <div class="relative group">
                        <select id="source-format" onchange="handleSourceChange()" class="w-full appearance-none bg-slate-900 border-2 border-slate-700 hover:border-brand-500 text-white font-bold py-4 px-5 pr-12 rounded-2xl focus:outline-none focus:ring-4 focus:ring-brand-500/20 transition cursor-pointer shadow-inner">
                            <!-- Populated by JS -->
                        </select>
                        <i class="fa-solid fa-chevron-down absolute right-5 top-5 text-slate-500 group-hover:text-brand-400 transition pointer-events-none"></i>
                    </div>
                </div>

                <!-- Flip Button -->
                <div class="pt-6">
                    <button id="master-flip-btn" onclick="flipConversion()" class="w-14 h-14 bg-slate-800 hover:bg-brand-600 text-white rounded-full shadow-[0_0_15px_rgba(0,0,0,0.5)] border-4 border-slate-950 flex items-center justify-center transition-all duration-300 outline-none">
                        <i id="flip-icon" class="fa-solid fa-right-left text-lg transition duration-500"></i>
                    </button>
                </div>

                <!-- Target Format Dropdown -->
                <div class="flex-1 w-full relative">
                    <label class="block text-xs font-bold text-slate-400 mb-2 uppercase tracking-wider"><i class="fa-solid fa-file-export mr-1"></i> Target Action</label>
                    <div class="relative group">
                        <select id="target-format" onchange="handleTargetChange()" class="w-full appearance-none bg-slate-900 border-2 border-slate-700 hover:border-brand-500 text-white font-bold py-4 px-5 pr-12 rounded-2xl focus:outline-none focus:ring-4 focus:ring-brand-500/20 transition cursor-pointer shadow-inner">
                            <!-- Populated dynamically based on Source -->
                        </select>
                        <i class="fa-solid fa-chevron-down absolute right-5 top-5 text-slate-500 group-hover:text-brand-400 transition pointer-events-none"></i>
                    </div>
                </div>
            </div>
            
            <div id="tool-desc-badge" class="mt-6 text-center text-sm font-medium text-slate-400 bg-slate-900/50 py-2.5 px-4 rounded-xl inline-block w-full">
                <!-- Tool description populated dynamically -->
            </div>
        </div>

        <!-- Dynamic Tool UI Area -->
        <div id="active-workspace-area" class="bg-slate-950 border border-slate-800 rounded-3xl p-6 sm:p-10 shadow-2xl min-h-[400px]">
            <!-- Rendered via JS based on selection -->
        </div>

        <div id="toast-container" class="fixed bottom-6 right-6 z-50 flex flex-col gap-2"></div>
    </main>

    <!-- Main JS Application Logic -->
    <script src="Envizionomniconvertpro.js">
      
    </script>
</body>
</html>
