<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instant Dictionary & Pronunciation</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Open Sans', sans-serif;
            background-color: #f9f9f9;
        }
        .font-serif-word {
            font-family: 'Lora', serif;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .spinner {
            border: 3px solid #e5e7eb;
            border-radius: 50%;
            border-top-color: #002147;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        
        .speaker-btn {
            transition: all 0.2s ease;
        }
        .speaker-btn:hover {
            transform: scale(1.05);
            background-color: #f3f4f6;
        }
        .speaker-btn:active {
            transform: scale(0.95);
        }
        
        /* Wiktionary injects HTML, so we style basic tags here */
        .wiktionary-def i { color: #4b5563; }
        .wiktionary-def b { color: #111827; }
        .wiktionary-def a { color: #2563eb; text-decoration: none; pointer-events: none; }
    </style>
</head>
<body class="min-h-screen flex flex-col text-gray-800">

    <header class="bg-[#002147] text-white sticky top-0 z-10 shadow-md">
        <div class="max-w-4xl mx-auto px-4 py-3 flex flex-col sm:flex-row items-center justify-between gap-4">
            <div class="flex items-center gap-3 cursor-pointer" onclick="resetApp()">
                <div class="bg-white text-[#002147] font-serif-word font-bold text-xl px-2 py-1 rounded-sm shadow-sm">
                    Dict
                </div>
                <span class="font-semibold tracking-wide text-lg">Instant Dictionary</span>
            </div>
            
            <form id="search-form" class="w-full sm:w-80 relative">
                <input 
                    type="text" 
                    id="search-input" 
                    placeholder="Search any word in the world..." 
                    class="w-full pl-3 pr-10 py-2 rounded-sm border-0 focus:outline-none focus:ring-2 focus:ring-[#f1c40f] text-gray-900 text-sm shadow-inner"
                    autocomplete="off"
                    required
                >
                <button type="submit" class="absolute right-0 top-0 h-full px-3 text-gray-400 hover:text-[#002147] bg-white rounded-r-sm transition-colors focus:outline-none">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z" clip-rule="evenodd" />
                    </svg>
                </button>
            </form>
        </div>
        <div class="h-1 w-full bg-[#f1c40f]"></div>
    </header>

    <main class="flex-1 max-w-4xl w-full mx-auto p-4 sm:p-6 bg-white shadow-sm border-x border-gray-200 min-h-screen">
        
        <div id="loading-state" class="hidden flex flex-col items-center justify-center py-20 text-gray-500">
            <div class="spinner mb-4"></div>
            <p id="loading-text">Searching databases and preparing audio...</p>
        </div>

        <div id="error-state" class="hidden py-10 px-6 text-center border-t-4 border-red-500 bg-red-50 mt-4 rounded-sm shadow-sm">
            <h2 id="error-title" class="text-xl font-bold text-red-700 mb-2 font-serif-word">Connection Error</h2>
            <p id="error-message" class="text-gray-700 text-sm">Please check your internet connection and try again.</p>
        </div>

        <div id="empty-state" class="flex flex-col items-center justify-center py-32 text-gray-400 text-center px-4">
            <div class="text-6xl mb-4 font-serif-word text-gray-200">Aa</div>
            <h2 class="text-xl font-semibold text-gray-600 mb-2">Omni-Search Dictionary</h2>
            <p class="text-sm max-w-md">Type any word, compound, or phrase. We search multiple global dictionaries and generate instant pronunciations.</p>
        </div>

        <div id="result-content" class="hidden flex-col">
            <div class="border-b-2 border-gray-100 pb-6 mb-6">
                <h1 id="display-word" class="text-4xl sm:text-5xl font-serif-word font-bold text-[#002147] mb-4 lowercase tracking-tight"></h1>
                
                <div class="flex flex-wrap items-center gap-6 text-sm">
                    <!-- UK Pronunciation Block -->
                    <div id="uk-pronunciation-block" class="flex items-center gap-2 hidden">
                        <span class="font-bold text-red-600 text-xs tracking-wider">UK</span>
                        <button onclick="playAudio('uk')" class="speaker-btn text-red-600 p-1 border border-red-200 rounded-full bg-red-50 focus:outline-none focus:ring-2 focus:ring-red-400" title="Listen to UK pronunciation">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M9.383 3.076A1 1 0 0110 4v12a1 1 0 01-1.707.707L4.586 13H2a1 1 0 01-1-1V8a1 1 0 011-1h2.586l3.707-3.707a1 1 0 011.09-.217zM14.657 2.929a1 1 0 011.414 0A9.972 9.972 0 0119 10a9.972 9.972 0 01-2.929 7.071 1 1 0 01-1.414-1.414A7.971 7.971 0 0017 10c0-2.21-.894-4.208-2.343-5.657a1 1 0 010-1.414zm-2.829 2.828a1 1 0 011.415 0A5.983 5.983 0 0115 10a5.984 5.984 0 01-1.757 4.243 1 1 0 01-1.415-1.415A3.984 3.984 0 0013 10a3.983 3.983 0 00-1.172-2.828 1 1 0 010-1.415z" clip-rule="evenodd" /></svg>
                        </button>
                        <span id="uk-phonetic" class="font-sans text-gray-600"></span>
                    </div>

                    <!-- US Pronunciation Block -->
                    <div id="us-pronunciation-block" class="flex items-center gap-2 hidden">
                        <span class="font-bold text-blue-600 text-xs tracking-wider">US</span>
                        <button onclick="playAudio('us')" class="speaker-btn text-blue-600 p-1 border border-blue-200 rounded-full bg-blue-50 focus:outline-none focus:ring-2 focus:ring-blue-400" title="Listen to US pronunciation">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M9.383 3.076A1 1 0 0110 4v12a1 1 0 01-1.707.707L4.586 13H2a1 1 0 01-1-1V8a1 1 0 011-1h2.586l3.707-3.707a1 1 0 011.09-.217zM14.657 2.929a1 1 0 011.414 0A9.972 9.972 0 0119 10a9.972 9.972 0 01-2.929 7.071 1 1 0 01-1.414-1.414A7.971 7.971 0 0017 10c0-2.21-.894-4.208-2.343-5.657a1 1 0 010-1.414zm-2.829 2.828a1 1 0 011.415 0A5.983 5.983 0 0115 10a5.984 5.984 0 01-1.757 4.243 1 1 0 01-1.415-1.415A3.984 3.984 0 0013 10a3.983 3.983 0 00-1.172-2.828 1 1 0 010-1.415z" clip-rule="evenodd" /></svg>
                        </button>
                        <span id="us-phonetic" class="font-sans text-gray-600"></span>
                    </div>

                    <!-- General / TTS Pronunciation Block (Fallback) -->
                    <div id="general-pronunciation-block" class="flex items-center gap-2 hidden">
                        <button onclick="playAudio('general')" class="speaker-btn text-gray-700 p-1 border border-gray-300 rounded-full bg-gray-100 focus:outline-none focus:ring-2 focus:ring-gray-400" title="Listen to pronunciation">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M9.383 3.076A1 1 0 0110 4v12a1 1 0 01-1.707.707L4.586 13H2a1 1 0 01-1-1V8a1 1 0 011-1h2.586l3.707-3.707a1 1 0 011.09-.217zM14.657 2.929a1 1 0 011.414 0A9.972 9.972 0 0119 10a9.972 9.972 0 01-2.929 7.071 1 1 0 01-1.414-1.414A7.971 7.971 0 0017 10c0-2.21-.894-4.208-2.343-5.657a1 1 0 010-1.414zm-2.829 2.828a1 1 0 011.415 0A5.983 5.983 0 0115 10a5.984 5.984 0 01-1.757 4.243 1 1 0 01-1.415-1.415A3.984 3.984 0 0013 10a3.983 3.983 0 00-1.172-2.828 1 1 0 010-1.415z" clip-rule="evenodd" /></svg>
                        </button>
                        <span id="general-phonetic" class="font-sans text-gray-600 font-bold">Listen</span>
                    </div>
                </div>
            </div>

            <!-- Meanings injected here via Javascript -->
            <div id="meanings-container" class="space-y-8"></div>
        </div>
    </main>




    <script src="InstantDictionary.js">
 
    </script>
</body>
</html>
