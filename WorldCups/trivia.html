<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Cup Trivia — Test Your Knowledge</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<main>
  <section class="hero">
    <div class="shell">
      <span class="eyebrow">Real facts only</span>
      <h1 class="text-chalk">World Cup Trivia</h1>
      <p class="sub">Every question is built from a verified 2022 World Cup result, award, or stat. Sign in with Google to put your score on the global leaderboard.</p>
    </div>
  </section>

  <section class="section">
    <div class="shell" style="max-width:640px; margin:0 auto;">

      <div id="trivia-intro" class="trivia-card" style="text-align:center;">
        <h2 style="margin-bottom:12px;">Ready?</h2>
        <p>10 random questions, pulled fresh each time. No repeats within a round.</p>
        <button class="btn btn-primary" id="trivia-start-btn" style="margin-top:16px;">Start trivia →</button>
      </div>

      <div id="trivia-play" class="trivia-card" style="display:none;">
        <div class="trivia-progress" id="trivia-progress"></div>
        <div class="eyebrow" id="trivia-counter"></div>
        <div class="trivia-q" id="trivia-q"></div>
        <div class="trivia-options" id="trivia-options"></div>
        <div class="trivia-fact" id="trivia-fact"></div>
        <div style="text-align:right; margin-top:16px;">
          <button class="btn btn-primary" id="trivia-next" style="display:none;">Next →</button>
        </div>
      </div>

      <div id="trivia-result" class="trivia-card" style="display:none; text-align:center;">
        <span class="eyebrow">Final score</span>
        <div class="trivia-score" id="trivia-final-score"></div>
        <p id="trivia-verdict" style="margin-top:8px; font-size:16px; color:var(--chalk);"></p>
        <p id="trivia-submit-status" style="margin-top:12px; font-size:13px;"></p>
        <button class="btn btn-primary" id="trivia-restart-btn" style="margin-top:16px;">Play again</button>
      </div>

    </div>
  </section>

  <section class="section" style="border-top:1px solid var(--line);">
    <div class="shell" style="max-width:640px; margin:0 auto;">
      <div class="section-head">
        <div>
          <span class="eyebrow">Worldwide</span>
          <h2>Leaderboard</h2>
        </div>
      </div>
      <div id="leaderboard-list"></div>
    </div>
  </section>
</main>

<script src="wc2022.js"></script>
<script src="trivia.js"></script>
<script src="firebase-auth.js"></script>
<script src="app.js"></script>
<script src="trivia-game.js"></script>
<script>
  renderHeader("trivia");
  renderFooter();
</script>
</body>
</html>
