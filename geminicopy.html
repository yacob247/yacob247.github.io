<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instrumental Extractor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a; /* Slate 900 */
            color: #f8fafc;
            overflow-x: hidden;
        }
        
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1e293b; }
        ::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 4px; }

        .glass-panel {
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .gradient-text {
            background: linear-gradient(to right, #3b82f6, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 15px rgba(59, 130, 246, 0.4); }
            50% { box-shadow: 0 0 30px rgba(139, 92, 246, 0.7); }
        }
        .processing-pulse {
            animation: pulse-glow 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        audio {
            width: 100%;
            height: 40px;
            border-radius: 8px;
            outline: none;
        }
        /* Custom audio controls styling */
        audio::-webkit-media-controls-panel {
            background-color: #1e293b;
            color: #fff;
        }
        audio::-webkit-media-controls-current-time-display,
        audio::-webkit-media-controls-time-remaining-display {
            color: #fff;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

    <main class="w-full max-w-3xl glass-panel rounded-3xl p-8 flex flex-col gap-8 relative">
        
        <!-- Header -->
        <div class="text-center space-y-3">
            <div class="inline-flex items-center justify-center p-3 bg-blue-500/10 rounded-2xl mb-2">
                <svg class="w-8 h-8 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-3"></path></svg>
            </div>
            <h1 class="text-4xl md:text-5xl font-extrabold tracking-tight">Pure<span class="gradient-text">Music</span></h1>
            <p class="text-slate-400 font-medium">Instant Hardware-Accelerated Vocal Removal</p>
        </div>

        <div id="dropZone" class="border-2 border-dashed border-slate-600 rounded-2xl p-10 md:p-16 text-center hover:border-blue-500 hover:bg-slate-800/40 transition-all cursor-pointer group">
            <input type="file" id="fileInput" class="hidden" accept="audio/*, video/*">
            <div class="space-y-4 pointer-events-none flex flex-col items-center">
                <div class="p-4 bg-slate-800 rounded-full group-hover:bg-blue-500/20 transition-colors duration-300">
                    <svg class="w-10 h-10 text-slate-400 group-hover:text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path></svg>
                </div>
                <div>
                    <p class="text-xl font-bold text-slate-200 group-hover:text-white transition-colors">Select an Audio File</p>
                    <p class="text-sm text-slate-500 mt-1">Drag & drop or click to browse (MP3, WAV, M4A)</p>
                </div>
            </div>
            <button onclick="document.getElementById('fileInput').click()" class="mt-8 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white px-8 py-3 rounded-xl font-bold transition-all shadow-lg shadow-blue-500/25 pointer-events-auto transform active:scale-95">
                Choose File
            </button>
        </div>

        <div id="processingState" class="hidden flex-col items-center justify-center py-12 space-y-6">
            <div class="relative w-20 h-20">
                <div class="absolute inset-0 border-4 border-slate-700 rounded-full"></div>
                <div class="absolute inset-0 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
            </div>
            <h3 class="text-2xl font-bold text-white" id="processingText">Isolating Instruments...</h3>
            <p class="text-slate-400 text-sm text-center max-w-sm">Applying hardware-accelerated phase cancellation and sub-bass recovery.</p>
        </div>

        <div id="resultsZone" class="hidden flex-col gap-8 animate-fade-in">
            <div class="bg-slate-800/80 rounded-2xl p-6 border border-slate-700 shadow-xl">
                <h3 class="text-xl font-bold text-white mb-4 flex items-center gap-2">
                    <svg class="w-5 h-5 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                    Instrumental Track Ready
                </h3>
                
                <div class="flex flex-col md:flex-row items-center gap-6">
                    <div class="flex-1 w-full">
                        <audio id="audioInst" controls class="w-full"></audio>
                    </div>
                    <a id="downloadInst" class="w-full md:w-auto text-center bg-white text-slate-900 hover:bg-slate-200 px-6 py-3 rounded-xl font-bold transition-colors shadow-lg cursor-pointer flex items-center justify-center gap-2">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                        Save WAV
                    </a>
                </div>
            </div>

            <button onclick="resetApp()" class="text-slate-400 hover:text-white font-medium transition-colors flex items-center justify-center gap-2 self-center">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                Process Another File
            </button>
        </div>
    </main>

    <div id="messageBox" class="fixed bottom-6 right-6 bg-slate-800 border-l-4 border-blue-500 text-white p-4 rounded shadow-2xl transform translate-x-[150%] transition-transform duration-300 z-50 max-w-sm">
        <div class="flex items-start gap-3">
            <svg id="msgIcon" class="w-6 h-6 text-blue-400 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            <p id="messageText" class="font-medium text-sm mt-0.5"></p>
        </div>
    </div>

    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const processingState = document.getElementById('processingState');
        const processingText = document.getElementById('processingText');
        const resultsZone = document.getElementById('resultsZone');
        const messageBox = document.getElementById('messageBox');
        const messageText = document.getElementById('messageText');
        const msgIcon = document.getElementById('msgIcon');
        
        const audioInst = document.getElementById('audioInst');
        const downloadInst = document.getElementById('downloadInst');

        function showMessage(text, isError = false) {
            messageText.innerText = text;
            messageBox.style.borderLeftColor = isError ? '#ef4444' : '#3b82f6';
            msgIcon.classList.toggle('text-red-400', isError);
            msgIcon.classList.toggle('text-blue-400', !isError);
            messageBox.style.transform = 'translateX(0)';
            setTimeout(() => {
                messageBox.style.transform = 'translateX(150%)';
            }, 5000);
        }

        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, preventDefaults, false);
        });

        function preventDefaults(e) {
            e.preventDefault();
            e.stopPropagation();
        }

        ['dragenter', 'dragover'].forEach(eventName => {
            dropZone.addEventListener(eventName, () => dropZone.classList.add('border-blue-500', 'bg-slate-800/60'), false);
        });

        ['dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, () => dropZone.classList.remove('border-blue-500', 'bg-slate-800/60'), false);
        });

        dropZone.addEventListener('drop', (e) => {
            handleFiles(e.dataTransfer.files);
        });

        fileInput.addEventListener('change', function() {
            handleFiles(this.files);
        });

        async function handleFiles(files) {
            if (files.length === 0) return;
            const file = files[0];
            
            if (!file.type.startsWith('audio/') && !file.type.startsWith('video/')) {
                showMessage("Unsupported format. Please upload an audio file.", true);
                return;
            }

            dropZone.classList.add('hidden');
            processingState.classList.remove('hidden');
            processingState.classList.add('flex');
            processingText.innerText = "Reading Audio Data...";
            
            try {
                const arrayBuffer = await file.arrayBuffer();
                processingText.innerText = "Decoding Track...";
                
                // Use standard AudioContext to decode
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                
                // Wrap in Promise for Safari compatibility
                const audioBuffer = await new Promise((resolve, reject) => {
                    ctx.decodeAudioData(arrayBuffer, resolve, reject);
                });
                
                ctx.close(); // Cleanup initial context

                if (audioBuffer.numberOfChannels === 1) {
                    throw new Error("MONO_FILE");
                }
                
                await executePhaseCancellation(audioBuffer, file.name);
                
            } catch (err) {
                console.error(err);
                processingState.classList.add('hidden');
                processingState.classList.remove('flex');
                dropZone.classList.remove('hidden');

                if (err.message === "MONO_FILE") {
                    showMessage("Error: This file is Mono. Vocal extraction requires a Stereo file.", true);
                } else {
                    showMessage("Error decoding audio. The file might be corrupted or DRM protected.", true);
                }
                fileInput.value = "";
            }
        }

        async function executePhaseCancellation(originalBuffer, fileName) {
            processingText.innerText = "Isolating Instruments (Phase Cancellation)...";
            
            // Allow UI to update before heavy rendering
            await new Promise(r => setTimeout(r, 50)); 

            try {
                // Setup an OfflineAudioContext for instantaneous background rendering
                const offlineCtx = new (window.OfflineAudioContext || window.webkitOfflineAudioContext)(
                    2, // Output channels (Stereo)
                    originalBuffer.length,
                    originalBuffer.sampleRate
                );

                // Source node
                const source = offlineCtx.createBufferSource();
                source.buffer = originalBuffer;

                // Split stereo into Left (0) and Right (1)
                const splitter = offlineCtx.createChannelSplitter(2);
                source.connect(splitter);

                // --- PATH A: VOCAL REMOVAL (L - R) ---
                // We invert the right channel and add it to the left. 
                // Anything panned dead-center (vocals) will cancel out to silence.
                
                const leftGain = offlineCtx.createGain();
                leftGain.gain.value = 1.0;
                
                const rightInvertGain = offlineCtx.createGain();
                rightInvertGain.gain.value = -1.0; // Invert phase

                splitter.connect(leftGain, 0);       // Left -> LeftGain
                splitter.connect(rightInvertGain, 1); // Right -> RightInvertGain

                const phaseCancelledSum = offlineCtx.createGain();
                phaseCancelledSum.gain.value = 1.0; // This combines Left and -Right

                leftGain.connect(phaseCancelledSum);
                rightInvertGain.connect(phaseCancelledSum);

                // Since vocals are gone but we also lost center bass, we highpass this 
                // to remove muddy artifacts in the low frequencies.
                const highPass = offlineCtx.createBiquadFilter();
                highPass.type = 'highpass';
                highPass.frequency.value = 150; // Cut below 150Hz
                phaseCancelledSum.connect(highPass);

                // --- PATH B: BASS RECOVERY (L + R, Lowpassed) ---
                // We take the original mix, turn it to mono, and keep only the bass
                const bassSum = offlineCtx.createGain();
                bassSum.gain.value = 0.5; // Average L+R
                splitter.connect(bassSum, 0);
                splitter.connect(bassSum, 1);

                const lowPass = offlineCtx.createBiquadFilter();
                lowPass.type = 'lowpass';
                lowPass.frequency.value = 150; // Keep only below 150Hz
                bassSum.connect(lowPass);

                // --- PATH C: FINAL MIX ---
                // Combine the vocal-free mids/highs with the preserved bass
                const finalMix = offlineCtx.createGain();
                finalMix.gain.value = 1.0;
                
                highPass.connect(finalMix);
                lowPass.connect(finalMix);

                // Route the mono result to BOTH Left and Right channels for a full sound
                const merger = offlineCtx.createChannelMerger(2);
                finalMix.connect(merger, 0, 0); // Connect to Left
                finalMix.connect(merger, 0, 1); // Connect to Right
                
                merger.connect(offlineCtx.destination);

                // Start processing
                source.start(0);
                
                // Render the audio mathematically (Hardware Accelerated, usually takes < 2 seconds)
                const renderedBuffer = await offlineCtx.startRendering();
                
                processingText.innerText = "Encoding WAV File...";
                await new Promise(r => setTimeout(r, 50)); 

                // Encode and Display
                finalizeOutput(renderedBuffer, fileName);

            } catch(e) {
                console.error("Rendering Error: ", e);
                throw new Error("Failed during audio processing");
            }
        }

        function finalizeOutput(audioBuffer, originalName) {
            const wavBlob = createWavFile(audioBuffer);
            const wavUrl = URL.createObjectURL(wavBlob);

            audioInst.src = wavUrl;
            downloadInst.href = wavUrl;
            
            // Clean up original filename for the download attribute
            let baseName = originalName.substring(0, originalName.lastIndexOf('.')) || originalName;
            downloadInst.download = `${baseName}_Instrumental.wav`;

            // Update UI 
            processingState.classList.add('hidden');
            processingState.classList.remove('flex');
            resultsZone.classList.remove('hidden');
            resultsZone.classList.add('flex');
            
            showMessage("Instrumental successfully extracted!");
        }

        function createWavFile(audioBuffer) {
            const numChannels = audioBuffer.numberOfChannels;
            const sampleRate = audioBuffer.sampleRate;
            const format = 1; // PCM
            const bitDepth = 16;
            const bytesPerSample = bitDepth / 8;
            const blockAlign = numChannels * bytesPerSample;
            const byteRate = sampleRate * blockAlign;
            const dataSize = audioBuffer.length * blockAlign;
            const bufferSize = 44 + dataSize;
            
            const arrayBuffer = new ArrayBuffer(bufferSize);
            const view = new DataView(arrayBuffer);

            let offset = 0;
            const writeString = (str) => {
                for (let i = 0; i < str.length; i++) {
                    view.setUint8(offset + i, str.charCodeAt(i));
                }
                offset += str.length;
            };

            // Write WAV Header
            writeString('RIFF');
            view.setUint32(offset, 36 + dataSize, true); offset += 4;
            writeString('WAVE');
            writeString('fmt ');
            view.setUint32(offset, 16, true); offset += 4; 
            view.setUint16(offset, format, true); offset += 2;
            view.setUint16(offset, numChannels, true); offset += 2;
            view.setUint32(offset, sampleRate, true); offset += 4;
            view.setUint32(offset, byteRate, true); offset += 4;
            view.setUint16(offset, blockAlign, true); offset += 2;
            view.setUint16(offset, bitDepth, true); offset += 2;
            writeString('data');
            view.setUint32(offset, dataSize, true); offset += 4;

            // Interleave channels and convert to 16-bit integers
            const channels = [];
            for (let i = 0; i < numChannels; i++) {
                channels.push(audioBuffer.getChannelData(i));
            }

            for (let i = 0; i < audioBuffer.length; i++) {
                for (let channel = 0; channel < numChannels; channel++) {
                    let sample = Math.max(-1, Math.min(1, channels[channel][i]));
                    // Scale to 16-bit integer range
                    sample = sample < 0 ? sample * 32768 : sample * 32767; 
                    view.setInt16(offset, sample, true);
                    offset += 2;
                }
            }

            return new Blob([view], { type: 'audio/wav' });
        }

        function resetApp() {
            audioInst.pause();
            audioInst.src = "";
            fileInput.value = "";
            
            resultsZone.classList.add('hidden');
            resultsZone.classList.remove('flex');
            processingState.classList.add('hidden');
            processingState.classList.remove('flex');
            dropZone.classList.remove('hidden');
        }
    </script>
</body>
</html>
