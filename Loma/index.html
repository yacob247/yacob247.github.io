<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loma</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/marked@4.3.0/marked.min.js"></script>
<style>
  *{box-sizing:border-box}
  html,body{height:100%;margin:0;background:#0d0d0e;color:#e0e0e0;font-family:system-ui,sans-serif}
  ::-webkit-scrollbar{width:5px;height:5px}
  ::-webkit-scrollbar-thumb{background:#3c4043;border-radius:99px}
  @keyframes blink{50%{opacity:0}}
  @keyframes spin{to{transform:rotate(360deg)}}
  @keyframes dot{0%,80%,100%{transform:scale(0);opacity:.3}40%{transform:scale(1);opacity:1}}
  .dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:#a8c7fa;margin:0 2px;animation:dot 1.4s infinite both}
  .dot:nth-child(2){animation-delay:-.16s}.dot:nth-child(3){animation-delay:.16s}
  .cursor{display:inline-block;width:2px;height:1em;background:#a8c7fa;animation:blink .6s infinite;vertical-align:text-bottom;margin-left:2px}
  #sidebar{width:256px;transition:width .25s ease}
  #sidebar.collapsed{width:0;overflow:hidden}
  #canvas-panel{width:0;transition:width .25s ease;overflow:hidden}
  #canvas-panel.open{width:50%}
  @media(max-width:768px){#canvas-panel.open{width:100%}}
  pre code{font-family:'Courier New',monospace;font-size:13px}
  .prose p{margin:.5em 0}
  .prose ul,.prose ol{margin:.5em 0;padding-left:1.5em}
  .prose h1,.prose h2,.prose h3{color:#a8c7fa;margin:.75em 0 .25em}
  .prose code{background:#1e1f20;padding:1px 5px;border-radius:4px;font-size:.85em}
  .prose a{color:#a8c7fa;text-decoration:underline}
  .prose blockquote{border-left:3px solid #3c4043;padding-left:.75em;color:#9aa0a6;margin:.5em 0}
  .prose table{border-collapse:collapse;width:100%;margin:.75em 0}
  .prose th{background:#1e1f20;padding:6px 12px;border:1px solid #3c4043}
  .prose td{padding:6px 12px;border:1px solid #3c4043}
  textarea{field-sizing:content;min-height:44px;max-height:180px}
</style>
</head>
<body class="flex overflow-hidden h-full">

<!-- SIDEBAR -->
<aside id="sidebar" class="flex-shrink-0 bg-[#1a1b1c] border-r border-[#2e2f30] flex flex-col z-30">
  <div class="p-3 flex-shrink-0">
    <div class="flex items-center gap-2 mb-3 text-[#a8c7fa] font-bold">
      <i class="fa-solid fa-bolt text-sm"></i>
      <span class="text-sm">Loma</span>
    </div>
    <button id="btn-new-chat" class="w-full py-2 px-3 bg-[#282a2c] hover:bg-[#3c4043] rounded-xl text-xs font-medium flex items-center gap-2 border border-[#3c4043] transition">
      <i class="fa-solid fa-plus text-[#a8c7fa]"></i> New Thread
    </button>
  </div>
  <div id="chat-list" class="flex-1 overflow-y-auto px-2 space-y-0.5 text-xs"></div>
  <div class="p-3 border-t border-[#2e2f30] flex flex-col gap-1.5 flex-shrink-0">
    <button id="btn-export-dpo" class="text-xs text-gray-400 hover:text-white py-1.5 px-3 rounded-lg hover:bg-[#3c4043] transition text-left">
      <i class="fa-solid fa-download mr-1"></i> Export Training Data
    </button>
    <button id="google-login-btn" class="text-xs text-gray-400 hover:text-white py-1.5 px-3 rounded-lg hover:bg-[#3c4043] transition text-left">
      <i class="fa-brands fa-google mr-1"></i> Sync with Drive
    </button>
    <div id="drive-status" class="hidden text-xs text-emerald-400 py-1 px-3">
      <i class="fa-solid fa-cloud-arrow-up mr-1"></i> Drive Synced
    </div>
  </div>
</aside>

<!-- MAIN -->
<main class="flex-1 flex flex-col min-w-0 h-full bg-[#0d0d0e] relative">
  <header class="h-12 flex justify-between items-center px-3 border-b border-[#2e2f30] flex-shrink-0">
    <div class="flex items-center gap-2">
      <button id="btn-toggle-sidebar" class="p-2 text-gray-400 hover:text-white transition"><i class="fa-solid fa-bars text-sm"></i></button>
      <span id="chat-title" class="text-sm font-medium truncate max-w-xs">New Session</span>
    </div>
    <button id="btn-toggle-canvas" class="p-2 text-gray-400 hover:text-orange-400 transition" title="Toggle Canvas">
      <i class="fa-brands fa-html5"></i>
    </button>
  </header>

  <div id="chat-stream" class="flex-1 overflow-y-auto p-4 space-y-5 pb-36">
    <div id="empty-state" class="flex flex-col items-center justify-center h-full text-center text-gray-500 py-20">
      <i class="fa-solid fa-bolt text-3xl text-[#a8c7fa] mb-3 opacity-40"></i>
      <p class="text-sm">Loma Engine Online.</p>
    </div>
  </div>

  <!-- INPUT -->
  <div class="absolute bottom-0 left-0 right-0 p-3 bg-gradient-to-t from-[#0d0d0e] via-[#0d0d0e]/95 to-transparent">
    <div class="max-w-3xl mx-auto bg-[#1a1b1c] rounded-2xl border border-[#3c4043] focus-within:border-[#a8c7fa]/60 transition-colors p-2 shadow-xl">
      <textarea id="prompt-input" class="w-full bg-transparent outline-none resize-none px-2 py-2 text-sm text-white placeholder-gray-500" placeholder="Command Loma..."></textarea>
      <div class="flex justify-between items-center px-1">
        <div class="flex items-center gap-1">
          <button id="web-toggle" class="text-xs text-gray-500 hover:text-white px-2 py-1 rounded transition">
            <i class="fa-solid fa-globe mr-1"></i>Web
          </button>
          <button id="stop-btn" class="hidden text-xs text-orange-400 hover:text-orange-300 px-2 py-1 rounded transition">
            <i class="fa-solid fa-stop mr-1"></i>Stop
          </button>
        </div>
        <button id="submit-prompt-btn" class="w-8 h-8 rounded-full bg-[#3c4043] hover:bg-[#a8c7fa] hover:text-black transition flex items-center justify-center">
          <i class="fa-solid fa-arrow-up text-xs"></i>
        </button>
      </div>
    </div>
  </div>
</main>

<!-- CANVAS -->
<aside id="canvas-panel" class="border-l border-[#2e2f30] bg-white flex flex-col flex-shrink-0 z-20">
  <div class="h-12 bg-[#1a1b1c] flex justify-between items-center px-3 border-b border-[#2e2f30] flex-shrink-0">
    <span class="text-sm font-medium text-white"><i class="fa-brands fa-html5 text-orange-400 mr-2"></i>Canvas</span>
    <div class="flex items-center gap-2">
      <button id="btn-download-canvas" class="text-xs text-gray-400 hover:text-white px-2 py-1 rounded transition">
        <i class="fa-solid fa-download"></i>
      </button>
      <button id="btn-close-canvas" class="text-gray-400 hover:text-white p-1 transition"><i class="fa-solid fa-xmark"></i></button>
    </div>
  </div>
  <iframe id="canvas-frame" class="flex-1 w-full border-none bg-white" sandbox="allow-scripts allow-forms allow-modals allow-pointer-lock allow-same-origin"></iframe>
</aside>

<script type="module" src="./js/main.js"></script>
</body>
</html>
