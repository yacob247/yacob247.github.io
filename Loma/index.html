<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexGen AI Platform</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0f0f12; color: #f0f0f5; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        .app-container { max-width: 900px; width: 100%; height: 85vh; background: #16161f; border-radius: 16px; border: 1px solid #232334; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 12px 40px rgba(0,0,0,0.6); }
        .header { background: #1c1c27; padding: 18px 24px; border-bottom: 1px solid #232334; display: flex; align-items: center; justify-content: space-between; }
        .header h1 { font-size: 18px; font-weight: 700; color: #ffffff; letter-spacing: -0.5px; display: flex; align-items: center; gap: 8px; }
        .status-badge { font-size: 12px; padding: 6px 14px; border-radius: 20px; font-weight: 600; background: #221919; color: #ff5252; border: 1px solid #3a1e1e; transition: all 0.3s ease; }
        .status-ready { background: #142217; color: #4caf50; border: 1px solid #1e3a22; }
        .chat-pane { flex-grow: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 16px; background: #111118; }
        .message-row { display: flex; flex-direction: column; max-width: 80%; padding: 14px 18px; border-radius: 12px; font-size: 15px; line-height: 1.6; }
        .msg-system { background: #1c1c27; color: #9a9ab0; border: 1px solid #232334; align-self: center; text-align: center; max-width: 100%; font-size: 13px; }
        .msg-user { background: #2563eb; color: #ffffff; align-self: flex-end; border-bottom-right-radius: 4px; }
        .msg-ai { background: #1c1c27; color: #e4e4ed; align-self: flex-start; border-bottom-left-radius: 4px; border: 1px solid #232334; }
        .control-panel { padding: 20px 24px; background: #1c1c27; border-top: 1px solid #232334; display: flex; gap: 12px; align-items: center; }
        textarea { flex-grow: 1; background: #111118; border: 1px solid #28283d; color: #ffffff; padding: 14px; border-radius: 8px; resize: none; height: 50px; font-family: inherit; font-size: 15px; outline: none; transition: border 0.2s; }
        textarea:focus { border-color: #2563eb; }
        button { background: #2563eb; color: #ffffff; border: none; padding: 0 28px; height: 50px; border-radius: 8px; font-weight: 600; font-size: 15px; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 6px; }
        button:hover { background: #1d4ed8; }
        button:disabled { background: #232334; color: #52526b; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <h1>✨ Yacob AI Engine</h1>
        <div id="status" class="status-badge">🔄 Initializing WebGPU...</div>
    </div>
    
    <div id="chat-pane" class="chat-pane">
        <div class="message-row msg-system">
            ⚙️ Decentralized Network Activated: Your custom model weights pull directly into browser memory. Server costs: $0.00.
        </div>
    </div>

    <div class="control-panel">
        <textarea id="user-input" placeholder="Ask your AI engine anything..." disabled></textarea>
        <button id="send-btn" onclick="sendMessage()" disabled>Send</button>
    </div>
</div>

<!-- WebLLM Module Integration Engine -->
<script type="module">
    import * as webllm from "https://esm.run";

    // Set to handle your compiled 1.5B structural config layout profile
// Paste your exact account namespace target string into your web script:
const MODEL_PROFILE = "Yacob-OKour14342/trained_rlhf_adapter-Q4_K_M-GGUF";
    let inferenceEngine;

    async function bootstrapSystem() {
        const statusDisplay = document.getElementById("status");
        const textInput = document.getElementById("user-input");
        const actionButton = document.getElementById("send-btn");

        try {
            statusDisplay.innerHTML = "⏳ Streaming custom weights to browser memory...";
            
            // Connect to web-compiled runtime cache instance
            inferenceEngine = await webllm.CreateMLCEngine(MODEL_PROFILE, {
                initProgressCallback: (progressInfo) => {
                    statusDisplay.innerHTML = `📦 ${progressInfo.text}`;
                }
            });

            statusDisplay.innerHTML = "⚡ Engine Connected via WebGPU";
            statusDisplay.classList.add("status-ready");
            textInput.disabled = false;
            actionButton.disabled = false;
        } catch (sysError) {
            statusDisplay.innerHTML = "❌ WebGPU Framework Missing / Unsupported Device";
            console.error(sysError);
        }
    }

    window.sendMessage = async function() {
        const promptInput = document.getElementById("user-input");
        const displayPane = document.getElementById("chat-pane");
        const userPromptText = promptInput.value.trim();
        
        if (!userPromptText) return;
        promptInput.value = "";

        // Display user prompt bubble
        displayPane.innerHTML += `<div class="message-row msg-user">${userPromptText}</div>`;
        
        // Display placeholder AI response container
        const interactiveResponseId = "ai-stream-" + Date.now();
        displayPane.innerHTML += `<div class="message-row msg-ai" id="${interactiveResponseId}">⚡ Fusing context tokens...</div>`;
        displayPane.scrollTop = displayPane.scrollHeight;

        const ongoingConversation = [{ role: "user", content: userPromptText }];
        const systemTokenStream = await inferenceEngine.chat.completions.create({ messages: ongoingConversation, stream: true });
        
        let cumulativeResponseString = "";
        const targetOutputElement = document.getElementById(interactiveResponseId);

        for await (const streamingChunk of systemTokenStream) {
            const structuralFragment = streamingChunk.choices?.delta?.content || "";
            cumulativeResponseString += structuralFragment;
            targetOutputElement.innerText = cumulativeResponseString;
            displayPane.scrollTop = displayPane.scrollHeight;
        }
    }

    window.addEventListener("DOMContentLoaded", bootstrapSystem);
</script>

</body>
</html>
