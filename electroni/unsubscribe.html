<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/png" href="/logo.png">
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Unsubscribe — Electroni</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --navy:#0D1B2A;--blue:#1A6DFF;
  --gray:#64748B;--gray-light:#F1F5F9;--white:#fff;
  --radius:14px;--transition:.22s cubic-bezier(.4,0,.2,1);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Nunito',sans-serif;color:var(--navy);background:var(--gray-light);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.card{background:var(--white);border-radius:var(--radius);padding:3rem;max-width:500px;width:90%;box-shadow:0 20px 60px rgba(13,27,42,.1);text-align:center;}
h1{font-family:'Sora',sans-serif;font-size:1.8rem;font-weight:800;margin-bottom:.8rem;letter-spacing:-0.5px;}
p{color:var(--gray);font-size:.95rem;line-height:1.6;margin-bottom:2rem;}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:.4rem;padding:.75rem 1.4rem;border-radius:50px;font-family:'Sora',sans-serif;font-weight:600;font-size:.9rem;cursor:pointer;text-decoration:none;transition:all var(--transition);border:none;}
.btn-primary{background:var(--blue);color:#fff;box-shadow:0 4px 16px rgba(26,109,255,.3);}
.btn-primary:hover{background:#0f5de0;transform:translateY(-1px);}
</style>
</head>
<body>
<div class="card">
  <h1>Unsubscribe Successful</h1>
  <p>You have been successfully unsubscribed. We're sorry to see you go. If you change your mind, you can always sign up again.</p>
  <a href="electroni.html" class="btn btn-primary">Return to Home</a>
</div>
</body>
</html>
