<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Appeal Unsubscription - Electroni</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;700;800&family=Nunito:wght@500;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;padding:24px;font-family:Nunito,Arial,sans-serif;background:#F4F7FB;color:#102033}.card{width:min(100%,560px);background:#fff;border:1px solid #DCE5F2;border-radius:12px;padding:28px;box-shadow:0 18px 45px rgba(16,32,51,.08)}h1{font-family:Sora,Arial,sans-serif;font-size:2rem;margin:0 0 .6rem}p{color:#66758A;line-height:1.6;margin:0 0 1rem}.eyebrow{font-size:.72rem;font-weight:900;letter-spacing:1.3px;text-transform:uppercase;color:#216BFF}label{display:grid;gap:.35rem;font-size:.82rem;font-weight:900;margin:1rem 0;color:#102033}input,textarea{width:100%;border:1.5px solid #D4DEEB;border-radius:8px;padding:.75rem .85rem;font:inherit}textarea{min-height:130px;resize:vertical}button,a.btn{border:0;border-radius:999px;background:#216BFF;color:#fff;padding:.75rem 1rem;font:800 .82rem Sora,Arial,sans-serif;cursor:pointer;text-decoration:none}.actions{display:flex;gap:.65rem;flex-wrap:wrap;margin-top:1rem}.status{min-height:1.4rem;margin-top:1rem;font-weight:900}.ok{color:#047857}.bad{color:#B91C1C}
</style>
</head>
<body>
<main class="card">
  <p class="eyebrow">Appeal</p>
  <h1>Send an appeal</h1>
  <p>If you unsubscribed by mistake or want your access reviewed, send a message to the Electroni owner.</p>
  <form id="appeal-form">
    <label>Email address<input id="email" type="email" placeholder="you@example.com" required></label>
    <label>Appeal message<textarea id="message" required placeholder="Explain what happened or what you want reviewed..."></textarea></label>
    <div class="actions">
      <button id="submit-btn" type="submit">Send appeal</button>
      <a class="btn" href="login.html">Return to login</a>
    </div>
  </form>
  <div class="status" id="status" aria-live="polite"></div>
</main>
<script src="electroni-mail.js"></script>
<script>
const params = new URLSearchParams(location.search);
document.getElementById('email').value = params.get('email') || '';
document.getElementById('appeal-form').addEventListener('submit', async event => {
  event.preventDefault();
  const email = document.getElementById('email').value.trim();
  const message = document.getElementById('message').value.trim();
  const status = document.getElementById('status');
  if(!email || !message) {
    status.textContent = 'Enter your email and appeal message.';
    status.className = 'status bad';
    return;
  }
  document.getElementById('submit-btn').disabled = true;
  if(window.ElectroniMail) {
    await window.ElectroniMail.sendOwnerEmail({
      subject:`Electroni unsubscribe appeal: ${email}`,
      topic:'electroni-unsubscribe-appeal',
      text:[`Email: ${email}`, '', message].join('\n'),
      data:{userEmail:email, appealMessage:message}
    }).catch(error => console.warn(error));
  }
  status.textContent = 'Appeal sent.';
  status.className = 'status ok';
  event.target.reset();
});
</script>
</body>
</html>
