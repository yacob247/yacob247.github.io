<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Electroni Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Nunito:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#f7f9fd;--panel:#fff;--line:#dfe7f3;--text:#0d1b2a;--muted:#64748b;--blue:#1a6dff;--orange:#ff6b35;--green:#16a34a;--red:#dc2626;--amber:#d97706;--shadow:0 18px 48px rgba(13,27,42,.09)}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:Nunito,system-ui,sans-serif;display:grid;grid-template-columns:330px 1fr;min-height:100vh}button,input,textarea,select{font:inherit}button{cursor:pointer}.side{background:var(--panel);border-right:1px solid var(--line);height:100vh;display:flex;flex-direction:column}.head{padding:20px;border-bottom:1px solid var(--line)}.logo{font-family:Sora,sans-serif;font-weight:800;font-size:1.35rem}.logo span{color:var(--blue)}.status{margin-top:12px;border:1px solid var(--line);border-radius:999px;padding:7px 10px;color:var(--muted);font-size:.78rem;font-weight:900}.status.ok{background:#ecfdf5;color:var(--green)}.status.err{background:#fef2f2;color:var(--red)}.actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:14px}.btn{border:1px solid var(--line);border-radius:10px;background:#fff;color:var(--text);padding:9px 12px;font-weight:900}.btn.primary{background:var(--blue);color:#fff;border:0}.btn.orange{background:var(--orange);color:#fff;border:0}.btn.danger{background:#fef2f2;color:var(--red)}.btn.good{background:#ecfdf5;color:var(--green)}.btn.warn{background:#fff7ed;color:var(--amber)}.btn.small{padding:6px 9px;font-size:.78rem}.search{width:100%;margin-top:12px;border:1px solid var(--line);border-radius:10px;padding:10px 12px}.meta{margin-top:10px;color:var(--muted);font-weight:900;font-size:.82rem}.list{padding:10px;overflow:auto;flex:1}.item{border:1px solid transparent;border-radius:12px;padding:11px;cursor:pointer}.item:hover,.item.active{background:#f4f7ff;border-color:#cddbf8}.item strong{display:block}.item span{color:var(--muted);font-size:.78rem;font-weight:800}.main{height:100vh;overflow:auto;padding:26px}.top{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;margin-bottom:18px}.top h1{font-family:Sora,sans-serif;margin:0;font-size:clamp(1.8rem,3vw,2.6rem);letter-spacing:-.06em}.top p{margin:6px 0 0;color:var(--muted);font-weight:700}.card{background:var(--panel);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);padding:18px;margin-bottom:14px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.field{display:grid;gap:6px}.field label{font-size:.78rem;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);font-weight:900}.field input,.field textarea,.field select{border:1px solid var(--line);border-radius:10px;padding:10px 12px;background:#fff;color:var(--text);outline:none}.field textarea{resize:vertical;min-height:90px;line-height:1.55}.span2{grid-column:1/-1}.section-title{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:12px;font-size:.8rem;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);font-weight:900}.topic{border:1px solid var(--line);border-radius:14px;margin-bottom:10px;overflow:hidden}.topic-head{display:flex;justify-content:space-between;gap:10px;align-items:center;background:#f8fbff;border-bottom:1px solid var(--line);padding:10px 12px}.topic-body{padding:12px;display:grid;gap:12px}.school-row{display:grid;grid-template-columns:1fr 1fr auto;gap:8px;margin-bottom:8px}.app-list{display:grid;gap:10px}.app-card{border:1px solid var(--line);border-radius:14px;padding:14px;background:#fff;display:grid;gap:10px}.app-actions{display:flex;gap:8px;flex-wrap:wrap}.pill{display:inline-flex;width:max-content;border-radius:999px;padding:4px 10px;font-size:.75rem;font-weight:900}.pill.pending{background:#fff7ed;color:#9a3412}.pill.approved{background:#ecfdf5;color:#047857}.pill.rejected{background:#fef2f2;color:#b91c1c}.empty{height:65vh;display:grid;place-items:center;text-align:center;color:var(--muted)}.empty h2{color:var(--text);margin:.2rem 0}.toast{position:fixed;right:22px;bottom:22px;background:#0d1b2a;color:#fff;padding:12px 14px;border-radius:12px;box-shadow:var(--shadow);font-weight:900;opacity:0;transform:translateY(20px);transition:.2s}.toast.show{opacity:1;transform:none}.toast.success{background:var(--green)}.toast.error{background:var(--red)}@media(max-width:900px){body{grid-template-columns:1fr}.side{height:auto;max-height:48vh}.main{height:auto}.grid,.school-row{grid-template-columns:1fr}}
.topic-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}.topic-tab{border:1px solid var(--line);background:#fff;color:var(--muted);border-radius:999px;padding:7px 10px;font-size:.75rem;font-weight:900}.topic-tab.active{background:var(--blue);border-color:var(--blue);color:#fff}.topic-pane{display:none}.topic-pane.active{display:grid;gap:12px}.resource-row{display:grid;grid-template-columns:160px 1fr 1.4fr auto;gap:8px;margin-bottom:8px}.image-preview{max-width:220px;max-height:140px;border:1px solid var(--line);border-radius:10px;object-fit:cover;background:#f8fbff}.help{font-size:.78rem;color:var(--muted);font-weight:800;line-height:1.45}@media(max-width:900px){.resource-row{grid-template-columns:1fr}}
</style>
</head>
<body>
<aside class="side">
  <div class="head">
    <div class="logo">Electron<span>i</span> Admin</div>
    <div id="status" class="status">Not connected</div>
    <div class="actions">
      <button class="btn" onclick="connectGitHub()">Connect</button>
      <button class="btn" onclick="pullCourses()">Pull</button>
      <button class="btn primary" onclick="publishCourses()">Publish</button>
      <button class="btn orange" onclick="newSubject()">New Subject</button>
      <button class="btn" onclick="showApplications()">Applications</button>
      <button class="btn" onclick="showCourses()">Courses</button>
    </div>
    <input id="search" class="search" type="search" placeholder="Search subjects" oninput="renderList()">
    <div id="count" class="meta">0 subjects</div>
  </div>
  <div id="list" class="list"><div class="empty">Pull course data from GitHub to start.</div></div>
</aside>
<main class="main">
  <div class="top">
    <div>
      <h1>Course Data</h1>
      <p>Edits publish to <strong>electroni/course-data.js</strong>. This admin manages subjects, topics, quizzes, textbooks, videos, and school codes.</p>
    </div>
    <a class="btn" href="electroni.html" target="_blank">Open Electroni</a>
  </div>
  <div id="editor" class="empty"><div><h2>No subject selected</h2><p>Pull from GitHub, then select a subject.</p></div></div>
</main>
<div id="toast" class="toast"></div>

<!-- Added Auth script so Firestore isn't blocked by missing permissions -->
<script src="./firebase-config.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
<script src="electroni-mail.js"></script>
<script>
const OWNER_KEY="Electroni_git_owner",REPO_KEY="Electroni_git_repo",TOKEN_KEY="Electroni_git_token";
const DEFAULT_OWNER="yacob247",DEFAULT_REPO="yacob247.github.io",COURSE_PATH="electroni/course-data.js";
let data={subjects:[],schoolCodes:[]},applications=[],activeSlug="",remoteSha="",dirty=false,activeAdminView="courses";
function owner(){return localStorage.getItem(OWNER_KEY)||DEFAULT_OWNER}function repo(){return localStorage.getItem(REPO_KEY)||DEFAULT_REPO}function token(){return localStorage.getItem(TOKEN_KEY)||""}function headers(){return{Authorization:`token ${token()}`,"Content-Type":"application/json"}}
function esc(v){return String(v??"").replace(/[&<>"']/g,ch=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[ch]))}
function slugify(v){return String(v||"").toLowerCase().trim().replace(/[^a-z0-9\s-]/g,"").replace(/\s+/g,"-").replace(/-+/g,"-").replace(/^-|-$/g,"")}
function status(text,cls=""){const el=document.getElementById("status");el.textContent=text;el.className="status "+cls}function toast(msg,type=""){const el=document.getElementById("toast");el.textContent=msg;el.className="toast show "+type;setTimeout(()=>el.className="toast",2600)}function markDirty(){dirty=true;status("Unsaved local changes","err")}
function connectGitHub(){const o=prompt("GitHub owner",owner())||owner();const r=prompt("GitHub repo",repo())||repo();const t=prompt("GitHub token",token())||token();localStorage.setItem(OWNER_KEY,o);localStorage.setItem(REPO_KEY,r);if(t)localStorage.setItem(TOKEN_KEY,t);status(t?`Connected: ${o}/${r}`:"Token missing",t?"ok":"err")}
async function pullCourses(){if(!token())connectGitHub();if(!token())return toast("GitHub token required","error");status("Pulling from GitHub...");try{const res=await fetch(`https://api.github.com/repos/${owner()}/${repo()}/contents/${COURSE_PATH}?cb=${Date.now()}`,{headers:headers()});const file=await res.json();if(!res.ok)throw new Error(file.message||res.statusText);remoteSha=file.sha;const text=decodeURIComponent(escape(atob(file.content.replace(/\n/g, ''))));const loaded=new Function("window",`${text}; return window.Electroni_COURSE_DATA || {subjects:[], schoolCodes:[]};`)({});data=JSON.parse(JSON.stringify(loaded||{}));data.subjects ||= [];data.schoolCodes ||= [];activeSlug=data.subjects[0]?.slug||"";dirty=false;status(`Live: ${COURSE_PATH}`,"ok");renderList();renderEditor();toast(`Pulled ${data.subjects.length} subjects`,"success")}catch(e){status("Pull failed","err");toast(e.message,"error")}}
async function publishCourses(){if(!token())connectGitHub();if(!token())return toast("GitHub token required","error");saveSubject(false);status("Publishing...");try{if(!remoteSha){const latest=await fetch(`https://api.github.com/repos/${owner()}/${repo()}/contents/${COURSE_PATH}?cb=${Date.now()}`,{headers:headers()});if(latest.ok)remoteSha=(await latest.json()).sha}const payload={message:"Electroni Admin: update course data",content:btoa(unescape(encodeURIComponent(serializeCourses())))};if(remoteSha)payload.sha=remoteSha;const res=await fetch(`https://api.github.com/repos/${owner()}/${repo()}/contents/${COURSE_PATH}`,{method:"PUT",headers:headers(),body:JSON.stringify(payload)});const out=await res.json();if(!res.ok)throw new Error(out.message||res.statusText);remoteSha=out.content?.sha||remoteSha;await saveCoursesToFirestore().catch(error=>console.warn("Course Firestore publish skipped:",error));await ensureSubjectPagesExist();dirty=false;status(`Published: ${COURSE_PATH} and Firestore`,"ok");toast("Published to GitHub and Firestore","success")}catch(e){status("Publish failed","err");toast(e.message,"error")}}
async function ensureSubjectPagesExist(){
  for(const subject of data.subjects||[]){
    const path = `electroni/${subject.slug}.html`;
    try {
      const check = await fetch(`https://api.github.com/repos/${owner()}/${repo()}/contents/${path}`, {headers:headers()});
      if(check.status === 404) {
        const html = `<!DOCTYPE html>\n<html lang="en">\n<head>\n<meta charset="UTF-8">\n<title>${subject.title} - Electroni</title>\n<link rel="stylesheet" href="course.css">\n</head>\n<body data-subject="${subject.slug}">\n<script src="course-shell.js"><\/script>\n</body>\n</html>`;
        await fetch(`https://api.github.com/repos/${owner()}/${repo()}/contents/${path}`, {
          method:"PUT", headers:headers(), body:JSON.stringify({
            message: `Create ${subject.slug}.html page`,
            content: btoa(html)
          })
        });
      }
    } catch(e){ console.warn("Failed to check/create subject page", path, e); }
  }
}
function serializeCourses(){return `window.Electroni_COURSE_DATA = ${JSON.stringify(data,null,2)};\n`}
async function saveCoursesToFirestore(){const db=await getDb();if(!db)return;await db.collection("Electroni_course_data").doc("active").set({subjects:data.subjects||[],schoolCodes:data.schoolCodes||[],updatedAtLocal:new Date().toISOString(),updatedAt:firebase.firestore.FieldValue.serverTimestamp()},{merge:true});for(const subject of data.subjects||[]){if(subject.slug)await db.collection("Electroni_subjects").doc(subject.slug).set({...subject,updatedAtLocal:new Date().toISOString(),updatedAt:firebase.firestore.FieldValue.serverTimestamp()},{merge:true})}}
function renderList(){if(activeAdminView==="applications")return renderApplicationList();const q=document.getElementById("search").value.toLowerCase();const subjects=data.subjects.filter(s=>[s.title,s.slug,s.area,s.year].some(v=>String(v||"").toLowerCase().includes(q)));document.getElementById("count").textContent=`${subjects.length} of ${data.subjects.length} subjects`;document.getElementById("list").innerHTML=subjects.length?subjects.map(s=>`<div class="item ${s.slug===activeSlug?"active":""}" onclick="selectSubject('${esc(s.slug)}')"><strong>${esc(s.title||s.slug)}</strong><span>${esc(s.year||"")} / ${esc(s.area||"")} / ${(s.topics||[]).length} topics</span></div>`).join(""):`<div class="empty">No subjects found.</div>`}
function subject(){return data.subjects.find(s=>s.slug===activeSlug)}function selectSubject(slug){saveSubject(false);activeSlug=slug;renderList();renderEditor()}
function newSubject(){saveSubject(false);const s={slug:`new-subject-${Date.now()}`,title:"New Subject",year:"Year 12",area:"",textbook:"",topics:[]};data.subjects.unshift(s);activeSlug=s.slug;markDirty();renderList();renderEditor()}
function deleteSubject(){const s=subject();if(!s||!confirm(`Delete ${s.title||s.slug}?`))return;data.subjects=data.subjects.filter(x=>x.slug!==s.slug);activeSlug=data.subjects[0]?.slug||"";markDirty();renderList();renderEditor()}
function renderEditor(){const s=subject();if(!s){document.getElementById("editor").className="empty";document.getElementById("editor").innerHTML="<div><h2>No subject selected</h2><p>Create or pull subjects to edit.</p></div>";return}document.getElementById("editor").className="";document.getElementById("editor").innerHTML=`<div class="card"><div class="section-title"><span>Subject</span><button class="btn danger small" onclick="deleteSubject()">Delete Subject</button></div><div class="grid"><div class="field"><label>Title</label><input id="title" value="${esc(s.title)}" oninput="syncSubject(true)"></div><div class="field"><label>Slug</label><input id="slug" value="${esc(s.slug)}" oninput="syncSubject()"></div><div class="field"><label>Year</label><input id="year" value="${esc(s.year)}" oninput="syncSubject()"></div><div class="field"><label>Area</label><input id="area" value="${esc(s.area)}" oninput="syncSubject()"></div><div class="field span2"><label>Default Textbook Path</label><input id="textbook" value="${esc(s.textbook)}" oninput="syncSubject()"></div></div></div><div class="card"><div class="section-title"><span>Topics</span><button class="btn small" onclick="addTopic()">Add Topic</button></div><div id="topics">${(s.topics||[]).map(topicHtml).join("")||"<p>No topics yet.</p>"}</div></div><div class="card"><div class="section-title"><span>School Codes</span><button class="btn small" onclick="addSchoolCode()">Add Code</button></div><div id="schoolCodes">${(data.schoolCodes||[]).map(schoolHtml).join("")||"<p>No school codes yet.</p>"}</div></div>`}
function syncSubject(fromTitle=false){const s=subject();if(!s)return;s.title=document.getElementById("title").value;if(fromTitle&&/^new-subject-/.test(s.slug)){s.slug=slugify(s.title)||s.slug;document.getElementById("slug").value=s.slug;activeSlug=s.slug}else{s.slug=slugify(document.getElementById("slug").value)||s.slug;activeSlug=s.slug}s.year=document.getElementById("year").value;s.area=document.getElementById("area").value;s.textbook=document.getElementById("textbook").value;markDirty();renderList()}
function topicHtml(t,i){const resources=Array.isArray(t.resources)?t.resources:[];return `<div class="topic"><div class="topic-head"><strong>${esc(t.code||"Topic")}: ${esc(t.title||"")}</strong><div><button class="btn small" onclick="moveTopic(${i},-1)">Up</button> <button class="btn small" onclick="moveTopic(${i},1)">Down</button> <button class="btn danger small" onclick="removeTopic(${i})">Remove</button></div></div><div class="topic-body"><div class="topic-tabs"><button class="topic-tab active" type="button" onclick="switchTopicTab(this)">Setup</button><button class="topic-tab" type="button" onclick="switchTopicTab(this)">Lesson</button><button class="topic-tab" type="button" onclick="switchTopicTab(this)">Media</button><button class="topic-tab" type="button" onclick="switchTopicTab(this)">Resources</button><button class="topic-tab" type="button" onclick="switchTopicTab(this)">Quiz</button></div><div class="topic-pane active"><div class="grid"><div class="field"><label>Code</label><input data-i="${i}" data-k="code" value="${esc(t.code)}" oninput="syncTopic(this)"></div><div class="field"><label>Title</label><input data-i="${i}" data-k="title" value="${esc(t.title)}" oninput="syncTopic(this)"></div><div class="field"><label>Textbook / main PDF path</label><input data-i="${i}" data-k="textbook" value="${esc(t.textbook)}" oninput="syncTopic(this)"></div><div class="field"><label>Video URL or YouTube ID</label><input data-i="${i}" data-k="youtubeId" value="${esc(t.youtubeId||t.youtubeUrl||"")}" oninput="syncTopic(this)"></div></div><p class="help">Use exact selected subject pages. This editor writes directly into course-data.js when you publish.</p></div><div class="topic-pane"><div class="field"><label>Lesson text</label><textarea data-i="${i}" data-k="lessonText" oninput="syncTopic(this)" placeholder="Paste the real lesson text or extracted PDF text here.">${esc(t.lessonText||"")}</textarea></div><div class="field"><label>Short summary</label><textarea data-i="${i}" data-k="summary" oninput="syncTopic(this)" placeholder="Optional summary shown above resources.">${esc(t.summary||"")}</textarea></div></div><div class="topic-pane"><div class="grid"><div class="field"><label>Image URL / data URL</label><input data-i="${i}" data-k="imageUrl" value="${esc(t.imageUrl||"")}" oninput="syncTopic(this)" placeholder="Paste image URL or upload below"></div><div class="field"><label>Upload image</label><input type="file" accept="image/*" onchange="uploadTopicImage(this,${i})"></div><div class="field span2"><label>Video download URL</label><input data-i="${i}" data-k="videoDownloadUrl" value="${esc(t.videoDownloadUrl||"")}" oninput="syncTopic(this)" placeholder="Optional downloadable video/resource URL"></div>${t.imageUrl?`<div class="field span2"><label>Preview</label><img class="image-preview" src="${esc(t.imageUrl)}" alt=""></div>`:""}</div></div><div class="topic-pane"><div id="resources-${i}">${resources.map((r,ri)=>resourceHtml(r,i,ri)).join("")||"<p class='help'>No extra resources. Add PDF, image, worksheet, or external links here.</p>"}</div><button class="btn small" type="button" onclick="addResource(${i})">Add resource</button></div><div class="topic-pane"><div class="field span2"><label>Quiz Question</label><textarea data-i="${i}" data-k="quiz.question" oninput="syncTopic(this)" placeholder="Only add a real question. Leave blank if none.">${esc(t.quiz?.question||"")}</textarea></div><div class="grid">${[0,1,2,3].map(n=>`<div class="field"><label>Option ${String.fromCharCode(65+n)}</label><input data-i="${i}" data-k="quiz.options.${n}" value="${esc(t.quiz?.options?.[n]||"")}" oninput="syncTopic(this)"></div>`).join("")}<div class="field"><label>Correct Answer</label><select data-i="${i}" data-k="quiz.answerIndex" onchange="syncTopic(this)">${[0,1,2,3].map(n=>`<option value="${n}" ${Number(t.quiz?.answerIndex||0)===n?"selected":""}>${String.fromCharCode(65+n)}</option>`).join("")}</select></div></div></div></div></div>`}
function addTopic(){const s=subject();s.topics ||= [];s.topics.push({code:`TOPIC-${s.topics.length+1}`,title:"",youtubeId:"",textbook:s.textbook||"",lessonText:"",summary:"",imageUrl:"",resources:[]});markDirty();renderEditor()}
function removeTopic(i){subject().topics.splice(i,1);markDirty();renderEditor()}function moveTopic(i,d){const a=subject().topics,n=i+d;if(n<0||n>=a.length)return;[a[i],a[n]]=[a[n],a[i]];markDirty();renderEditor()}
function syncTopic(input){const t=subject().topics[Number(input.dataset.i)],k=input.dataset.k;if(k==="quiz.question"){t.quiz ||= {options:["","","",""],answerIndex:0};t.quiz.question=input.value}else if(k.startsWith("quiz.options.")){t.quiz ||= {options:["","","",""],answerIndex:0};t.quiz.options ||= ["","","",""];t.quiz.options[Number(k.split(".").pop())]=input.value}else if(k==="quiz.answerIndex"){t.quiz ||= {options:["","","",""],answerIndex:0};t.quiz.answerIndex=Number(input.value)}else t[k]=input.value;markDirty()}
function switchTopicTab(button){const body=button.closest(".topic-body");body.querySelectorAll(".topic-tab").forEach(tab=>tab.classList.remove("active"));body.querySelectorAll(".topic-pane").forEach(pane=>pane.classList.remove("active"));button.classList.add("active");body.querySelectorAll(".topic-pane")[Array.from(body.querySelectorAll(".topic-tab")).indexOf(button)]?.classList.add("active")}
function resourceHtml(r,i,ri){return `<div class="resource-row"><input placeholder="Type" value="${esc(r.type||"")}" oninput="syncResource(${i},${ri},'type',this.value)"><input placeholder="Title" value="${esc(r.title||"")}" oninput="syncResource(${i},${ri},'title',this.value)"><input placeholder="URL / PDF path" value="${esc(r.href||r.url||r.path||"")}" oninput="syncResource(${i},${ri},'href',this.value)"><button class="btn danger small" type="button" onclick="removeResource(${i},${ri})">Remove</button></div>`}
function addResource(i){const t=subject().topics[i];t.resources ||= [];t.resources.push({type:"PDF",title:"",href:""});markDirty();renderEditor()}
function removeResource(i,ri){const t=subject().topics[i];t.resources ||= [];t.resources.splice(ri,1);markDirty();renderEditor()}
function syncResource(i,ri,key,value){const t=subject().topics[i];t.resources ||= [];t.resources[ri] ||= {type:"PDF",title:"",href:""};t.resources[ri][key]=value;markDirty()}
function uploadTopicImage(input,i){const file=input.files&&input.files[0];if(!file)return;if(!/^image\//.test(file.type))return toast("Choose an image file","error");const reader=new FileReader();reader.onload=()=>{subject().topics[i].imageUrl=reader.result;markDirty();renderEditor();toast("Image added to lesson")};reader.readAsDataURL(file)}
function schoolHtml(item,i){return `<div class="school-row"><input data-i="${i}" data-k="code" value="${esc(item.code||"")}" oninput="syncSchool(this)" placeholder="Code"><input data-i="${i}" data-k="schoolName" value="${esc(item.schoolName||"")}" oninput="syncSchool(this)" placeholder="School name"><button class="btn danger small" onclick="removeSchoolCode(${i})">Remove</button></div>`}
function addSchoolCode(){data.schoolCodes ||= [];data.schoolCodes.push({code:"",schoolName:"",active:true});markDirty();renderEditor()}function removeSchoolCode(i){data.schoolCodes.splice(i,1);markDirty();renderEditor()}function syncSchool(input){data.schoolCodes[Number(input.dataset.i)][input.dataset.k]=input.value;markDirty()}
function saveSubject(show=true){if(document.getElementById("title")) syncSubject();if(show)toast("Subject saved locally")}
function showCourses(){activeAdminView="courses";renderList();renderEditor()}

// Upgraded to silently authenticate & never throw scary UI errors
async function getDb(){
  if(!window.ENVIZION_FIREBASE_CONFIG||!window.firebase)return null;
  if(!firebase.apps.length)firebase.initializeApp(window.ENVIZION_FIREBASE_CONFIG);
  
  if(firebase.auth) {
    const auth = firebase.auth();
    // Wait for auth to pick up session to attach tokens to Firestore requests
    await new Promise(resolve => {
      const unsubscribe = auth.onAuthStateChanged(user => {
        unsubscribe();
        if(user && user.email === "envizionupdates@gmail.com") { // Example admin check or just check if logged in
          document.body.style.display = 'grid'; // Admin verified
        } else {
          document.body.innerHTML = '<div style="padding:40px;text-align:center"><h2>Admin Access Only</h2><p>Please log in with an admin account.</p><a href="login.html">Login</a></div>';
        }
        resolve(user);
      });
    });
    // Optional: silently sign in anonymously if still completely unauthenticated
    if(!auth.currentUser) {
      try { await auth.signInAnonymously(); } catch(e) {}
    }
  }
  return firebase.firestore();
}

function applicationIdFor(email){return String(email||"unknown").toLowerCase().replace(/[^a-z0-9._-]/g,"_")}
function localApplications(){try{return JSON.parse(localStorage.getItem("electroni_applications")||"[]")}catch(e){return[]}}
function saveLocalApplications(){localStorage.setItem("electroni_applications",JSON.stringify(applications))}

async function loadApplications(){
  let local=localApplications();
  try{
    const db=await getDb();
    if(db){
      const snap=await db.collection("Electroni_applications").orderBy("createdAtLocal","desc").get();
      applications=snap.docs.map(doc=>({id:doc.id,...doc.data()}));
    } else applications=local;
  }catch(error){
    applications=local;
    console.warn("Using local applications fallback:", error.message); // Hidden from UI
  }
  saveLocalApplications();
}

async function showApplications(){
  activeAdminView="applications";
  document.getElementById("count").textContent="Loading applications...";
  document.getElementById("list").innerHTML='<div class="empty">Loading applications...</div>';
  document.getElementById("editor").className="";
  document.getElementById("editor").innerHTML='<div class="card"><div class="section-title"><span>Subscription Applications</span></div><p>Loading signup requests...</p></div>';
  await loadApplications();
  renderApplicationList();
  renderApplications();
}

function approvalState(app){return String(app.approvalStatus||app.status||"pending").toLowerCase()}
function approvalText(app){const s=approvalState(app);return s==="approved"?"approved":s==="rejected"?"rejected":"pending"}
function renderApplicationList(){
  const q=document.getElementById("search").value.toLowerCase();
  const filtered=applications.filter(app=>[app.email,app.displayName,app.firstName,app.lastName,app.role,approvalText(app)].some(v=>String(v||"").toLowerCase().includes(q)));
  document.getElementById("count").textContent=`${filtered.length} of ${applications.length} applications`;
  document.getElementById("list").innerHTML=filtered.length?filtered.map(app=>`<div class="item"><strong>${esc(app.displayName||app.email||app.id)}</strong><span>${esc(app.email||"")} / ${esc(approvalText(app))}</span></div>`).join(""):'<div class="empty">No applications found.</div>';
}
function renderApplications(){
  const groups={pending:[],approved:[],rejected:[]};
  applications.forEach(app=>{groups[approvalText(app)] ||= [];groups[approvalText(app)].push(app)});
  document.getElementById("editor").className="";
  document.getElementById("editor").innerHTML=`<div class="card"><div class="section-title"><span>Subscription Applications</span><button class="btn small" onclick="showApplications()">Refresh</button></div><p style="color:var(--muted);font-weight:800;margin-top:0">Approve after the user sends payment proof/screenshot. Approved users unlock selected subjects; rejected and pending users stay locked. You can manually manage user subjects by adding new ones or removing existing entries with the × button.</p></div>${["pending","approved","rejected"].map(state=>`<div class="card"><div class="section-title"><span>${state} (${groups[state].length})</span></div><div class="app-list">${groups[state].map(applicationCard).join("")||"<p>No applications.</p>"}</div></div>`).join("")}`;
}

function applicationCard(app){
  const state = approvalText(app);
  const subjectsArr = (app.selectedSubjects || app.subjects || []).filter(Boolean);
  const id = esc(app.id || applicationIdFor(app.email));
  
  // Custom display rendering with interactive '×' (Remove) buttons
  const subjectsHtml = subjectsArr.length
    ? subjectsArr.map(s => `
        <span class="pill ${state === 'approved' ? 'approved' : 'pending'}" style="margin:2px 2px 2px 0;font-size:.72rem;display:inline-flex;align-items:center;gap:6px;">
          ${esc(s)}
          <button onclick="removeSubjectFromUser('${id}', '${esc(s).replace(/'/g, "\\'")}')" style="background:transparent;border:none;color:inherit;cursor:pointer;padding:0;font-weight:bold;font-size:.85rem;line-height:1;margin-left:2px;" title="Remove Subject">&times;</button>
        </span>
      `).join("")
    : `<span style="color:var(--muted);font-size:.8rem">None selected</span>`;

  // Combine User's Hardcoded File Options with Pulled GitHub Courses
  const optionMap = new Map();
  const defaultFiles = [
    { id: "biology", name: "Biology" },
    { id: "business-studies", name: "Business Studies" },
    { id: "chemistry", name: "Chemistry" },
    { id: "economics", name: "Economics" },
    { id: "engineering-studies", name: "Engineering Studies" },
    { id: "french", name: "French" },
    { id: "hospitality", name: "Hospitality" },
    { id: "legal-studies", name: "Legal Studies" },
    { id: "mathematics-advanced", name: "Mathematics Advanced" },
    { id: "mathematics-standard-2", name: "Mathematics Standard 2" },
    { id: "mathematics-extension-1", name: "Mathematics Extension 1" },
    { id: "mathematics-extension-2", name: "Mathematics Extension 2" },
    { id: "modern-history", name: "Modern History" },
    { id: "pdhpe", name: "PDHPE" },
    { id: "physics", name: "Physics" },
    { id: "software-design-development", name: "Software Design and Development" },
    { id: "studies-of-religion", name: "Studies of Religion" }
  ];
  
  defaultFiles.forEach(f => optionMap.set(f.id, `${f.name} (File)`));
  
  if (data.subjects && data.subjects.length > 0) {
    data.subjects.forEach(sub => optionMap.set(sub.slug, `${sub.title || sub.slug} (Pulled)`));
  }

  const courseOptions = Array.from(optionMap.entries()).map(([val, label]) => {
    return `<option value="${esc(val)}">${esc(label)}</option>`;
  }).join("");

  return `<div class="app-card">
    <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
      <span class="pill ${state}">${state}</span>
      <strong>${esc(app.displayName || [app.firstName,app.lastName].filter(Boolean).join(" ") || app.email)}</strong>
    </div>
    <div style="color:var(--muted);font-weight:800;font-size:.82rem">${esc(app.email||"No email")} &middot; ${esc(app.role||"student")} &middot; ${esc(app.year||"")}</div>
    <div>
      <div style="font-size:.72rem;font-weight:900;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:5px">Selected Subjects</div>
      <div style="display:flex;flex-wrap:wrap;gap:3px;margin-bottom:8px">${subjectsHtml}</div>
      
      <!-- Subject Add Control dropdown -->
      <div style="display:flex;gap:6px;align-items:center;margin-top:6px;flex-wrap:wrap;">
        <select id="add-subject-select-${id}" style="border:1px solid var(--line);border-radius:8px;padding:5px 8px;font-size:.78rem;background:#fff;max-width:240px;">
          <option value="">-- Select Subject to Add --</option>
          ${courseOptions}
          <option value="__CUSTOM__">+ Custom Subject...</option>
        </select>
        <button class="btn primary small" style="padding:5px 12px;" onclick="addSubjectToUser('${id}')">Add Subject</button>
      </div>

      ${state === 'approved'
        ? `<div style="margin-top:10px;font-size:.78rem;font-weight:800;color:var(--green)">✓ Access granted to ${subjectsArr.length} subject${subjectsArr.length !== 1 ? 's' : ''}</div>`
        : state === 'rejected'
        ? `<div style="margin-top:10px;font-size:.78rem;font-weight:800;color:var(--red)">✗ Access denied — subjects locked</div>`
        : `<div style="margin-top:10px;font-size:.78rem;font-weight:800;color:var(--amber)">⏳ Awaiting approval — subjects locked</div>`
      }
    </div>
    <div style="font-size:.8rem"><strong>School code:</strong> ${esc(app.schoolCode||"None")}</div>
    <div class="app-actions">
      <button class="btn good small" onclick="setApplicationStatus('${id}','approved')">Approve</button>
      <button class="btn warn small" onclick="setApplicationStatus('${id}','pending')">Pending</button>
      <button class="btn danger small" onclick="setApplicationStatus('${id}','rejected')">Reject</button>
    </div>
  </div>`;
}

// Global functions for adding and removing user subjects
async function addSubjectToUser(id) {
  const index = applications.findIndex(app => (app.id || applicationIdFor(app.email)) === id);
  if(index < 0) return toast("Application not found", "error");
  
  const selectElement = document.getElementById(`add-subject-select-${id}`);
  if(!selectElement) return;

  let selectedValue = selectElement.value;
  if(!selectedValue) return toast("Please select a subject to add", "error");

  if(selectedValue === "__CUSTOM__") {
    const customName = prompt("Enter the exact subject name (e.g. 'biology' or 'Mathematics'):");
    if(!customName || !customName.trim()) return;
    selectedValue = customName.trim();
  }

  const app = applications[index];
  // Ensure array structures exist
  let subjectsList = Array.isArray(app.selectedSubjects) ? [...app.selectedSubjects] : (Array.isArray(app.subjects) ? [...app.subjects] : []);
  
  if(subjectsList.includes(selectedValue)) {
    return toast("Subject already assigned to this user", "error");
  }

  subjectsList.push(selectedValue);
  
  // Set back into the state
  app.selectedSubjects = subjectsList;
  app.subjects = subjectsList;
  if(approvalText(app) === "approved") {
    app.paidSubjects = subjectsList;
  }

  await saveUserChanges(index);
}

async function removeSubjectFromUser(id, subjectName) {
  const index = applications.findIndex(app => (app.id || applicationIdFor(app.email)) === id);
  if(index < 0) return toast("Application not found", "error");

  const app = applications[index];
  let subjectsList = Array.isArray(app.selectedSubjects) ? [...app.selectedSubjects] : (Array.isArray(app.subjects) ? [...app.subjects] : []);
  
  const originalLength = subjectsList.length;
  subjectsList = subjectsList.filter(s => s !== subjectName);
  
  if(subjectsList.length === originalLength) {
    return toast("Subject not found on user", "error");
  }

  // Set back into the state
  app.selectedSubjects = subjectsList;
  app.subjects = subjectsList;
  if(app.paidSubjects) {
    app.paidSubjects = app.paidSubjects.filter(s => s !== subjectName);
  }

  await saveUserChanges(index);
}

// Consolidates changes, stores locally, and syncs directly to Firebase collections
async function saveUserChanges(index) {
  const app = applications[index];
  app.updatedAtLocal = new Date().toISOString();
  saveLocalApplications();

  try {
    const db = await getDb();
    if(db) {
      const docId = app.id || applicationIdFor(app.email);
      const payload = {
        ...app,
        id: docId,
        updatedAtLocal: new Date().toISOString(),
        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
      };
      
      // Update primary applications schema
      await db.collection("Electroni_applications").doc(docId).set(payload, {merge:true});
      // Sync duplicate node schemas (users, by email lookup) so frontend profiles refresh immediately
      if(app.uid) {
        await db.collection("Electroni_users").doc(app.uid).set(payload, {merge:true});
      }
      if(app.email) {
        await db.collection("Electroni_users_by_email").doc(applicationIdFor(app.email)).set(payload, {merge:true});
      }
    }
    toast("User subjects updated and synced successfully", "success");
  } catch(error) {
    console.warn("Firebase sync warning:", error);
    toast("Saved locally (offline fallback active)", "success");
  }

  renderApplicationList();
  renderApplications();
}

function applyApproval(app,nextStatus){
  const selected=Array.isArray(app.selectedSubjects)?app.selectedSubjects:(Array.isArray(app.subjects)?app.subjects:[]);
  const approved=nextStatus==="approved";
  return {...app,status:nextStatus,approvalStatus:nextStatus,subscriptionStatus:approved?"active":nextStatus==="rejected"?"rejected":"pending_payment",paymentStatus:approved?"paid":nextStatus==="rejected"?"rejected":"unpaid",paidSubjects:approved?selected:[],updatedAtLocal:new Date().toISOString()};
}

async function setApplicationStatus(id, nextStatus){
  const index = applications.findIndex(app => (app.id || applicationIdFor(app.email)) === id);
  if(index < 0) return toast("Application not found", "error");
  applications[index] = applyApproval(applications[index], nextStatus);
  saveLocalApplications();
  try {
    const app = applications[index], db = await getDb();
    if(db){
      const docId = app.id || applicationIdFor(app.email);
      const payload = {...app, id:docId, updatedAtLocal:new Date().toISOString(), updatedAt:firebase.firestore.FieldValue.serverTimestamp()};
      await db.collection("Electroni_applications").doc(docId).set(payload, {merge:true});
      if(app.uid) await db.collection("Electroni_users").doc(app.uid).set(payload, {merge:true});
      if(app.email) await db.collection("Electroni_users_by_email").doc(applicationIdFor(app.email)).set(payload, {merge:true});
    }
    toast(`Marked ${nextStatus} successfully`, "success"); // Clean, no DB errors
    
    // Notify user by email on approve or reject
    if(app.email && window.ElectroniMail){
      const subjectsArr = (app.paidSubjects || app.selectedSubjects || app.subjects || []).filter(Boolean);
      const subjectsList = subjectsArr.length ? subjectsArr.map(s => `• ${s}`).join("\n") : "None";
      const name = app.displayName || app.firstName || "there";
      if(nextStatus === "approved"){
        window.ElectroniMail.sendUserEmail({
          to: app.email,
          subject: "Your Electroni subscription has been approved!",
          text: `Hi ${name},\n\nYour Electroni subscription has been approved.\n\nYou now have access to:\n${subjectsList}\n\nLog in at ${location.origin}/electroni/electroni.html to get started.\n\nThe Electroni Team`,
          topic: "electroni-subscription-approved"
        }).catch(() => {});
      } else if(nextStatus === "rejected"){
        window.ElectroniMail.sendUserEmail({
          to: app.email,
          subject: "Your Electroni subscription application",
          text: `Hi ${name},\n\nUnfortunately your Electroni subscription application was not approved at this time.\n\nPlease contact us if you have any questions.\n\nThe Electroni Team`,
          topic: "electroni-subscription-rejected"
        }).catch(() => {});
      }
    }
  } catch(error){
    console.warn("Firebase sync warning:", error);
    toast(`Marked ${nextStatus} successfully`, "success"); // Falls back quietly
  }
  renderApplicationList();
  renderApplications();
}
window.addEventListener("beforeunload",e=>{if(dirty){e.preventDefault();e.returnValue=""}});if(token())status(`Connected: ${owner()}/${repo()}`,"ok");
// Hide body initially to prevent unauthorized access flickering
document.body.style.display = 'none';
getDb(); // trigger auth check
